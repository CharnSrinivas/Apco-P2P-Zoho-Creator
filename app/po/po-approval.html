<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Receiving Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
    rel="stylesheet">

  <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] {
      display: none !important;
    }

    /* Modal styles */
    .po-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .po-modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.4);
    }

    .po-modal-box {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 11px;
      width: 100%;
      max-width: 600px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
    }

    /* Pills & Sticky cells */
    .pill-active {
      color: #1B5CA8 !important;
      background: #fff !important;
      font-weight: 600 !important;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .sticky-action-cell {
      position: sticky;
      right: 0;
      z-index: 2;
      box-shadow: -4px 0 8px -2px rgba(0, 0, 0, 0.06);
    }

    thead .sticky-action-cell {
      z-index: 3;
    }

    /* Sorting */
    th[data-sort] {
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    th[data-sort]:hover {
      background: #e9ecf1;
    }

    .sort-indicator {
      display: inline-block;
      width: 14px;
      text-align: center;
      font-size: 10px;
      color: #9ca3af;
      margin-left: 2px;
      vertical-align: middle;
    }

    th[data-sort].sort-active .sort-indicator {
      color: #1B5CA8;
    }

    /* Loaders */
    .po-spinner {
      border: 2.5px solid #e5e7eb;
      border-top-color: #1B5CA8;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Tom Select overrides */
    .ts-control {
      border: 1px solid #e5e7eb !important;
      border-radius: 0.5rem !important;
      font-size: 0.8125rem !important;
      padding: 0.5rem 0.75rem !important;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02) !important;
      font-family: inherit;
      background-color: #f9fafb !important;
      transition: all 0.2s ease-in-out;
    }

    .ts-control.focus {
      border-color: #1B5CA8 !important;
      background-color: #ffffff !important;
      box-shadow: 0 0 0 3px rgba(27, 92, 168, 0.15) !important;
    }

    .ts-dropdown {
      border-radius: 0.5rem !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
      border: 1px solid #f3f4f6 !important;
      padding: 0.35rem !important;
      margin-top: 4px !important;
      font-size: 0.8125rem !important;
    }

    .ts-dropdown .option {
      border-radius: 0.375rem !important;
      padding: 0.5rem 0.75rem !important;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .ts-dropdown .active {
      background-color: #f3f4f6 !important;
      color: #111827 !important;
    }

    .ts-dropdown .option:hover {
      background-color: #e5e7eb !important;
    }
  </style>
</head>

<body class="bg-gray-50 p-6">
  <div id="app" x-data="poWidget()"
    class="font-[Lato,sans-serif] text-[13px] text-gray-700 antialiased max-w-6xl mx-auto" x-cloak>

    <div class="grid grid-cols-4 gap-2.5 mb-4">
      <div
        class="bg-white border border-gray-200 rounded-lg p-[13px] pl-[17px] relative overflow-hidden transition-all duration-200 hover:shadow-md hover:-translate-y-[1px] before:content-[''] before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-[#1B5CA8]">
        <div class="text-[11px] font-medium text-gray-500 uppercase tracking-wide mb-1.5">Total POs</div>
        <div class="text-[25px] font-bold leading-none text-[#1B5CA8]" x-text="stats.total"></div>
      </div>
      <div
        class="bg-white border border-gray-200 rounded-lg p-[13px] pl-[17px] relative overflow-hidden transition-all duration-200 hover:shadow-md hover:-translate-y-[1px] before:content-[''] before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-amber-500">
        <div class="text-[11px] font-medium text-gray-500 uppercase tracking-wide mb-1.5">Pending / Partial</div>
        <div class="text-[25px] font-bold leading-none text-amber-500" x-text="stats.pending"></div>
      </div>
      <div
        class="bg-white border border-gray-200 rounded-lg p-[13px] pl-[17px] relative overflow-hidden transition-all duration-200 hover:shadow-md hover:-translate-y-[1px] before:content-[''] before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-emerald-600">
        <div class="text-[11px] font-medium text-gray-500 uppercase tracking-wide mb-1.5">Fully Received</div>
        <div class="text-[25px] font-bold leading-none text-emerald-600" x-text="stats.received"></div>
      </div>
      <div
        class="bg-white border border-gray-200 rounded-lg p-[13px] pl-[17px] relative overflow-hidden transition-all duration-200 hover:shadow-md hover:-translate-y-[1px] before:content-[''] before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-red-600">
        <div class="text-[11px] font-medium text-gray-500 uppercase tracking-wide mb-1.5">Rejected</div>
        <div class="text-[25px] font-bold leading-none text-red-600" x-text="stats.rejected"></div>
      </div>
    </div>

    <div class="flex items-center justify-between mt-[18px] mb-2">
      <span class="text-[13.5px] font-medium text-gray-900">Purchase Orders (Incoming)</span>
    </div>

    <div class="flex items-center justify-between gap-2.5 mb-2 flex-wrap">
      <div class="flex bg-gray-100 rounded-full p-[3px] gap-[2px]">
        <button @click="setFilter('all')"
          :class="filter === 'all' ? 'pill-active' : 'text-gray-600 hover:bg-white hover:text-[#1B5CA8]'"
          class="px-3 py-1 text-xs font-medium rounded-full transition-all duration-150">
          All (<span x-text="stats.total"></span>)
        </button>
        <button @click="setFilter('pending')"
          :class="filter === 'pending' ? 'pill-active' : 'text-gray-600 hover:bg-white hover:text-[#1B5CA8]'"
          class="px-3 py-1 text-xs font-medium rounded-full transition-all duration-150">
          Partially Received (<span x-text="stats.pending"></span>)
        </button>
        <button @click="setFilter('received')"
          :class="filter === 'received' ? 'pill-active' : 'text-gray-600 hover:bg-white hover:text-[#1B5CA8]'"
          class="px-3 py-1 text-xs font-medium rounded-full transition-all duration-150">
          Fully Received (<span x-text="stats.received"></span>)
        </button>
        <button @click="setFilter('rejected')"
          :class="filter === 'rejected' ? 'pill-active' : 'text-gray-600 hover:bg-white hover:text-[#1B5CA8]'"
          class="px-3 py-1 text-xs font-medium rounded-full transition-all duration-150">
          Rejected (<span x-text="stats.rejected"></span>)
        </button>
      </div>

      <div class="flex gap-2 items-center">
        <div class="relative">
          <i
            class="bi bi-search absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-[13px] pointer-events-none"></i>
          <input x-model="search" type="text" placeholder="Search PO #, PR Ref..."
            class="py-1.5 pl-7 pr-2.5 border border-gray-300 rounded-md text-xs text-gray-700 bg-white w-[220px] focus:outline-none focus:border-[#1B5CA8] focus:ring-[3px] focus:ring-[#1B5CA8]/10">
        </div>
        <button @click="openCreateModal()"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-[#1B5CA8] text-white rounded-md text-xs font-semibold hover:bg-[#12427b] transition-all shadow-sm">
          <i class="bi bi-plus-lg"></i> Create PO
        </button>
      </div>
    </div>

    <div class="bg-white border border-gray-200 rounded-lg overflow-x-auto">
      <table class="w-full border-collapse" style="min-width:850px">
        <thead>
          <tr class="bg-gray-50 border-b-[1.5px] border-gray-200">
            <template x-for="col in ['po_number', 'pr_ref', 'order_date', 'delivery_date', 'amount', 'status']"
              :key="col">
              <th @click="toggleSort(col)" data-sort
                class="px-3 py-2 text-[11px] font-semibold text-gray-500 uppercase text-left whitespace-nowrap"
                :class="[sortCol === col ? 'sort-active' : '', col === 'amount' ? 'text-right' : '']">
                <span
                  x-text="{po_number: 'PO #', pr_ref: 'PR Ref', order_date: 'Order Date', delivery_date: 'Delivery Date', amount: 'Amount', status: 'Status'}[col]"></span>
                <span class="sort-indicator" x-text="sortCol === col ? (sortDir === 'asc' ? '▲' : '▼') : ''"></span>
              </th>
            </template>
            <th
              class="px-3 py-2 text-[11px] font-semibold text-gray-500 uppercase text-left whitespace-nowrap bg-gray-50 sticky-action-cell">
              Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr x-show="isLoading">
            <td colspan="7" class="px-3 py-12 text-center">
              <div class="flex flex-col items-center gap-3">
                <div class="po-spinner"></div>
                <div class="text-sm text-gray-400 font-medium">Loading Purchase Orders…</div>
              </div>
            </td>
          </tr>

          <tr x-show="!isLoading && paginatedRecords.length === 0">
            <td colspan="7" class="px-3 py-12 text-center">
              <div class="text-gray-400">
                <i class="bi bi-clipboard-x text-3xl mb-2 block"></i>
                <div class="text-sm font-medium text-gray-500">No POs found</div>
              </div>
            </td>
          </tr>

          <template x-for="rec in paginatedRecords" :key="rec.ID">
            <tr class="border-b border-gray-100 hover:bg-[#EBF3FC] transition-colors duration-150 group">
              <td class="px-3 py-[9px] whitespace-nowrap"><span
                  class="font-semibold text-[#1B5CA8] font-mono text-[11px]" x-text="rec.PO_Ref_Number"></span></td>
              <td class="px-3 py-[9px] whitespace-nowrap font-medium text-gray-600 text-[11px]"
                x-text="rec.purchase_requisition_id || '–'"></td>
              <td class="px-3 py-[9px] whitespace-nowrap text-[11px] text-gray-500" x-text="formatDate(rec.order_date)">
              </td>
              <td class="px-3 py-[9px] whitespace-nowrap text-[11px] text-gray-500"
                x-text="formatDate(rec.delivery_date)"></td>
              <td
                class="px-3 py-[9px] whitespace-nowrap font-semibold text-gray-900 text-right tabular-nums text-[12px]"
                x-text="formatINR(rec.Total_Amount)"></td>
              <td class="px-3 py-[9px] whitespace-nowrap">
                <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold border"
                  :class="getStatusStyle(rec).classes">
                  <span class="w-[5px] h-[5px] rounded-full shrink-0" :class="getStatusStyle(rec).dot"></span>
                  <span x-text="rec.Status || 'Pending'"></span>
                </span>
              </td>
              <td class="px-3 py-[9px] whitespace-nowrap bg-white group-hover:bg-[#EBF3FC] sticky-action-cell">
                <div class="flex items-center gap-1.5">
                  <button
                    @click="ZOHO.CREATOR.UTIL.navigateParentURL({action:'open',url:'#Page:PO_Detailed?recordId='+rec.ID,window:'same'})"
                    class="inline-flex items-center gap-1 px-2 py-1 rounded bg-white text-gray-600 border border-gray-300 hover:bg-gray-50 text-[11px] font-medium transition-colors">
                    <i class="bi bi-eye"></i> View
                  </button>
                  <template x-if="['Pending', 'Submitted', 'Partially Received'].includes(rec.Status)">
                    <button @click="openGrnModal(rec)"
                      class="inline-flex items-center gap-1 px-2 py-1 rounded bg-[#1B5CA8] text-white border border-[#1B5CA8] hover:bg-[#14457e] text-[11px] font-medium transition-colors">
                      <i class="bi bi-box-seam"></i> Receive
                    </button>
                  </template>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>

      <div x-show="!isLoading && totalPages > 0"
        class="flex items-center justify-between px-[13px] py-[9px] border-t border-gray-200 bg-gray-50 text-xs text-gray-500">
        <span>Showing <span x-text="(page - 1) * perPage + 1"></span>–<span
            x-text="Math.min(page * perPage, filteredRecords.length)"></span> of <span
            x-text="filteredRecords.length"></span> records</span>
        <div class="flex gap-1">
          <button @click="page > 1 ? page-- : null" :disabled="page <= 1"
            class="min-w-[27px] h-[27px] px-1 border border-gray-300 rounded bg-white text-gray-600 inline-flex items-center justify-center transition-colors disabled:opacity-40 hover:border-[#1B5CA8] hover:text-[#1B5CA8]">
            <i class="bi bi-chevron-left"></i>
          </button>
          <template x-for="p in getPagesArray()" :key="p">
            <button @click="typeof p === 'number' ? page = p : null"
              :class="page === p ? 'border-[#1B5CA8] bg-[#1B5CA8] text-white' : (typeof p === 'number' ? 'border-gray-300 bg-white hover:border-[#1B5CA8] hover:text-[#1B5CA8]' : 'border-transparent bg-transparent text-gray-400 cursor-default')"
              class="min-w-[27px] h-[27px] px-1 border rounded inline-flex items-center justify-center transition-colors">
              <span x-text="p"></span>
            </button>
          </template>
          <button @click="page < totalPages ? page++ : null" :disabled="page >= totalPages"
            class="min-w-[27px] h-[27px] px-1 border border-gray-300 rounded bg-white text-gray-600 inline-flex items-center justify-center transition-colors disabled:opacity-40 hover:border-[#1B5CA8] hover:text-[#1B5CA8]">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>

    <div x-show="isModalOpen" style="display: none;" class="po-modal-overlay active">
      <div class="po-modal-bg" x-show="isModalOpen" x-transition.opacity @click="closeModal('po')"></div>
      <div class="po-modal-box max-w-4xl" style="max-height: 90vh; overflow-y: auto;" x-show="isModalOpen" x-transition>
        <div class="flex justify-between items-center px-5 py-3.5 border-b border-gray-200 bg-gray-50">
          <h3 class="text-[15px] font-bold text-gray-800">Create Purchase Order</h3>
          <button @click="closeModal('po')" class="text-gray-400 hover:text-gray-700 transition-colors"><i
              class="bi bi-x-lg text-lg"></i></button>
        </div>

        <form @submit.prevent="submitPO" class="p-5">
          <div class="grid grid-cols-2 gap-4 mb-5">
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Department / Unit <span
                  class="text-red-500">*</span></label>
              <select id="poDept" class="w-full text-xs" required></select>
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Purchase
                Requisition</label>
              <select id="poPrRef" class="w-full text-xs"></select>
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Order Date <span
                  class="text-red-500">*</span></label>
              <input type="date" x-model="poForm.orderDate" required
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] focus:ring-[3px] focus:ring-[#1B5CA8]/15 transition-all shadow-sm">
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Delivery Date <span
                  class="text-red-500">*</span></label>
              <input type="date" x-model="poForm.deliveryDate" :min="poForm.orderDate" required
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] focus:ring-[3px] focus:ring-[#1B5CA8]/15 transition-all shadow-sm">
            </div>
          </div>

          <div class="mb-5 border border-gray-200 rounded-lg overflow-hidden" style="overflow:visible;">
            <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
              <span class="text-xs font-semibold text-gray-700 tracking-wide">Items <span
                  class="text-red-500">*</span></span>
              <button type="button" @click="addItemRow('po')"
                class="text-[11px] font-semibold text-[#1B5CA8] bg-[#1B5CA8]/10 px-2.5 py-1 rounded-md hover:bg-[#1B5CA8]/20 transition-colors">+
                Add Item</button>
            </div>
            <div class="overflow-x-auto" style="overflow:visible;">
              <table class="w-full border-collapse min-w-[650px]">
                <thead class="bg-white border-b border-gray-200">
                  <tr>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[35%]">Item</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[15%]">Qty</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[20%]">Amount (₹)</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left">Comment</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-center w-10"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(item, index) in poForm.items" :key="item.uid">
                    <tr class="border-b border-gray-100 hover:bg-gray-50/50 transition-colors bg-white">
                      <td class="px-3 py-2 relative">
                        <select x-init="initItemSelect($el, item, 'po')" class="w-full text-xs" required></select>
                      </td>
                      <td class="px-3 py-2">
                        <input type="number" x-model.number="item.quantity"
                          @input="if(item.unitPrice) item.amount = Number((item.quantity * item.unitPrice).toFixed(2))"
                          required min="1"
                          class="w-full py-1.5 px-2.5 bg-gray-50 border border-gray-200 rounded-md text-[13px] focus:bg-white focus:outline-none focus:border-[#1B5CA8]">
                      </td>
                      <td class="px-3 py-2">
                        <input type="number" x-model.number="item.amount" required min="0" step="0.01"
                          class="w-full py-1.5 px-2.5 bg-gray-50 border border-gray-200 rounded-md text-[13px] focus:bg-white focus:outline-none focus:border-[#1B5CA8]">
                      </td>
                      <td class="px-3 py-2">
                        <input type="text" x-model="item.comment" placeholder="Optional"
                          class="w-full py-1.5 px-2.5 bg-gray-50 border border-gray-200 rounded-md text-[13px] focus:bg-white focus:outline-none focus:border-[#1B5CA8]">
                      </td>
                      <td class="px-3 py-2 text-center">
                        <button type="button" @click="removeItemRow(index, 'po')"
                          class="text-gray-400 hover:text-red-500 transition-colors p-1.5 rounded-md hover:bg-red-50"><i
                            class="bi bi-trash"></i></button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-5 border-t border-gray-100 pt-4">
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Remarks</label>
              <textarea x-model="poForm.remarks" rows="3"
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] transition-all shadow-sm"></textarea>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 flex flex-col justify-center gap-3">
              <div class="flex items-center justify-between">
                <label class="text-[12px] font-semibold text-gray-600">Discount (₹)</label>
                <input type="number" x-model.number="poForm.discount" min="0" step="0.01"
                  class="w-24 py-1 px-2 border border-gray-300 rounded text-right text-sm focus:outline-none focus:border-[#1B5CA8]">
              </div>
              <div class="flex items-center justify-between border-t border-gray-200 pt-2">
                <label class="text-[14px] font-bold text-gray-800">Total Amount</label>
                <div class="text-lg font-bold text-[#1B5CA8]" x-text="formatINR(calculatedTotal)"></div>
              </div>
            </div>
          </div>

          <div class="flex justify-end gap-2 border-t border-gray-100 pt-4">
            <button type="button" @click="closeModal('po')"
              class="px-4 py-1.5 border border-gray-300 text-gray-600 rounded-md text-xs font-semibold hover:bg-gray-50 transition-colors">Cancel</button>
            <button type="submit" :disabled="isSubmitting"
              class="inline-flex items-center justify-center min-w-[90px] px-4 py-1.5 bg-[#1B5CA8] text-white rounded-md text-xs font-semibold hover:bg-[#12427b] transition-colors shadow-sm disabled:opacity-70">
              <span x-show="!isSubmitting">Submit PO</span>
              <div x-show="isSubmitting" class="po-spinner"
                style="width:14px;height:14px;border-width:2px;border-top-color:white;"></div>
            </button>
          </div>
        </form>
      </div>
    </div>


    <div x-show="isGrnModalOpen" style="display: none;" class="po-modal-overlay active">
      <div class="po-modal-bg" x-show="isGrnModalOpen" x-transition.opacity @click="closeModal('grn')"></div>
      <div class="po-modal-box max-w-4xl" style="max-height: 90vh; overflow-y: auto;" x-show="isGrnModalOpen"
        x-transition>

        <div x-show="isLoadingGrnDetails"
          class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center gap-3">
          <div class="po-spinner"></div>
          <span class="text-xs font-semibold text-gray-500">Fetching PO Details...</span>
        </div>

        <div class="flex justify-between items-center px-5 py-3.5 border-b border-gray-200 bg-gray-50">
          <h3 class="text-[15px] font-bold text-gray-800">Receive Goods (GRN)</h3>
          <button @click="closeModal('grn')" class="text-gray-400 hover:text-gray-700 transition-colors"><i
              class="bi bi-x-lg text-lg"></i></button>
        </div>

        <form @submit.prevent="submitGRN" class="p-5">
          <div class="grid grid-cols-2 gap-4 mb-5">
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">PO Ref Number</label>
              <input type="text" x-model="grnForm.poRefNum" disabled
                class="w-full py-2 px-3 bg-gray-100 border border-gray-200 rounded-lg text-[13px] text-gray-500 font-mono">
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">PR Ref Number</label>
              <input type="text" x-model="grnForm.prRefNum" disabled
                class="w-full py-2 px-3 bg-gray-100 border border-gray-200 rounded-lg text-[13px] text-gray-500 font-mono">
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Order Date <span
                  class="text-red-500">*</span></label>
              <input type="date" x-model="grnForm.orderDate" required
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] focus:ring-[3px] focus:ring-[#1B5CA8]/15 transition-all shadow-sm">
            </div>
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Delivery Date <span
                  class="text-red-500">*</span></label>
              <input type="date" x-model="grnForm.deliveryDate" required
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] focus:ring-[3px] focus:ring-[#1B5CA8]/15 transition-all shadow-sm">
            </div>
          </div>

          <div class="mb-5 border border-gray-200 rounded-lg overflow-hidden" style="overflow:visible;">
            <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
              <span class="text-xs font-semibold text-gray-700 tracking-wide">Received Items <span
                  class="text-red-500">*</span></span>
              <button type="button" @click="addItemRow('grn')"
                class="text-[11px] font-semibold text-[#1B5CA8] bg-[#1B5CA8]/10 px-2.5 py-1 rounded-md hover:bg-[#1B5CA8]/20 transition-colors">+
                Add Item</button>
            </div>
            <div class="overflow-x-auto" style="overflow:visible;">
              <table class="w-full border-collapse min-w-[650px]">
                <thead class="bg-white border-b border-gray-200">
                  <tr>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[35%]">Item</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[15%]">Qty</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left w-[20%]">Amount (₹)</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-left">Comment</th>
                    <th class="px-3 py-2.5 text-[10px] font-semibold text-gray-500 text-center w-10"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(item, index) in grnForm.items" :key="item.uid">
                    <tr class="border-b border-gray-100 hover:bg-gray-50/50 transition-colors bg-white">
                      <td class="px-3 py-2 relative">
                        <select disabled x-init="initItemSelect($el, item, 'grn')"
                          class="w-full text-xs cursor-not-allowed" required></select>
                      </td>
                      <td class="px-3 py-2">
                        <input type="number" x-model.number="item.quantity"
                          @input="item.amount = Number((item.quantity * item.unitPrice).toFixed(2))"
                          :max="item.maxQuantity" required min="1"
                          class="w-full py-1.5 px-2.5 bg-gray-50 border border-gray-200 rounded-md text-[13px] focus:bg-white focus:outline-none focus:border-[#1B5CA8]">
                      </td>
                      <td class="px-3 py-2">
                        <input type="number" x-model.number="item.amount" disabled
                          class="w-full py-1.5 px-2.5 bg-gray-100 border border-gray-200 rounded-md text-[13px] text-gray-500 font-semibold cursor-not-allowed">
                      </td>
                      <td class="px-3 py-2">
                        <input type="text" x-model="item.comment" placeholder="Optional"
                          class="w-full py-1.5 px-2.5 bg-gray-50 border border-gray-200 rounded-md text-[13px] focus:bg-white focus:outline-none focus:border-[#1B5CA8]">
                      </td>
                      <td class="px-3 py-2 text-center">
                        <button type="button" @click="removeItemRow(index, 'grn')"
                          class="text-gray-400 hover:text-red-500 transition-colors p-1.5 rounded-md hover:bg-red-50"><i
                            class="bi bi-trash"></i></button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-5 border-t border-gray-100 pt-4">
            <div>
              <label class="block text-[11px] font-semibold text-gray-500 tracking-wide mb-1.5">Remarks / Additional
                Details</label>
              <textarea x-model="grnForm.remarks" rows="3"
                class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg text-[13px] text-gray-700 focus:bg-white focus:outline-none focus:border-[#1B5CA8] transition-all shadow-sm"></textarea>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 flex flex-col justify-center gap-3">
              <div class="flex items-center justify-between">
                <label class="text-[12px] font-semibold text-gray-600">Discount (₹)</label>
                <input type="number" x-model.number="grnForm.discount" min="0" step="0.01"
                  class="w-24 py-1 px-2 border border-gray-300 rounded text-right text-sm focus:outline-none focus:border-[#1B5CA8]">
              </div>
              <div class="flex items-center justify-between border-t border-gray-200 pt-2">
                <label class="text-[14px] font-bold text-gray-800">Total Amount</label>
                <div class="text-lg font-bold text-[#1B5CA8]" x-text="formatINR(calculatedGrnTotal)"></div>
              </div>
            </div>
          </div>

          <div class="flex justify-end gap-2 border-t border-gray-100 pt-4">
            <button type="button" @click="closeModal('grn')"
              class="px-4 py-1.5 border border-gray-300 text-gray-600 rounded-md text-xs font-semibold hover:bg-gray-50 transition-colors">Cancel</button>
            <button type="submit" :disabled="isGrnSubmitting || isLoadingGrnDetails"
              class="inline-flex items-center justify-center min-w-[100px] px-4 py-1.5 bg-[#1B5CA8] text-white rounded-md text-xs font-semibold hover:bg-[#12427b] transition-colors shadow-sm disabled:opacity-70">
              <span x-show="!isGrnSubmitting">Submit GRN</span>
              <div x-show="isGrnSubmitting" class="po-spinner"
                style="width:14px;height:14px;border-width:2px;border-top-color:white;"></div>
            </button>
          </div>
        </form>
      </div>
    </div>


  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3500, timerProgressBar: true, customClass: { popup: 'font-[Lato] text-sm' } });

      Alpine.data('poWidget', () => ({
        REPORT_NAME: 'Purchase_Order_Report',
        ITEMS_REPORT_NAME: 'Items_Report',
        UNIT_REPORT_NAME: 'Unit_Report',
        PR_REPORT_NAME: 'Purchase_Requisition_Report',

        allRecords: [], itemMasters: [], unitMasters: [],
        filter: 'all', search: '', isLoading: true,
        sortCol: 'order_date', sortDir: 'desc',
        page: 1, perPage: 10,
        stats: { total: '-', pending: '-', received: '-', rejected: '-' },

        isModalOpen: false, isSubmitting: false,
        isGrnModalOpen: false, isGrnSubmitting: false, isLoadingGrnDetails: false,

        poForm: { dept: '', prRefId: '', prRefText: '', orderDate: dayjs().format('YYYY-MM-DD'), deliveryDate: '', remarks: '', discount: 0, items: [] },
        grnForm: { poId: '', poRefNum: '', prId: '', prRefNum: '', orderDate: '', deliveryDate: '', remarks: '', discount: 0, items: [] },

        tsInstances: { dept: null, pr: null, poItems: [], grnItems: [] },

        init() {
          this.fetchRecords();
          this.fetchItemMasters();
          this.fetchUnitMasters();

          this.$watch('search', Alpine.debounce(() => { this.page = 1; this.fetchRecords(); }, 400));
          this.$watch('filter', () => { this.page = 1; this.fetchRecords(); });
        },

        // --- Computed Properties ---
        get calculatedTotal() {
          const subtotal = this.poForm.items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
          const disc = parseFloat(this.poForm.discount) || 0;
          return Math.max(0, subtotal - disc);
        },
        get calculatedGrnTotal() {
          const subtotal = this.grnForm.items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
          const disc = parseFloat(this.grnForm.discount) || 0;
          return Math.max(0, subtotal - disc);
        },

        get filteredRecords() {
          return [...this.allRecords].sort((a, b) => {
            let va = this.getSortValue(a, this.sortCol), vb = this.getSortValue(b, this.sortCol);
            let cmp = (typeof va === 'number' && typeof vb === 'number') ? va - vb : String(va).localeCompare(String(vb));
            return this.sortDir === 'asc' ? cmp : -cmp;
          });
        },
        get paginatedRecords() {
          const start = (this.page - 1) * this.perPage;
          return this.filteredRecords.slice(start, start + this.perPage);
        },
        get totalPages() {
          return Math.max(1, Math.ceil(this.filteredRecords.length / this.perPage));
        },

        // --- Data Fetching ---
        buildCriteria() {
          let criteria = [];
          if (this.search.trim()) {
            let q = this.search.trim().replace(/'/g, "\\'");
            criteria.push(`(PO_Ref_Number.contains("${q}") || purchase_requisition_id.contains("${q}") || Status.contains("${q}"))`);
          }
          if (this.filter === 'pending') criteria.push('(Status == "Pending" || Status == "Partially Received" || Status == "Submitted")');
          else if (this.filter === 'received') criteria.push('(Status == "Fully Received")');
          else if (this.filter === 'rejected') criteria.push('(Status == "Rejected")');
          return criteria.join(' && ');
        },

        async fetchRecords() {
          this.isLoading = true;
          this.allRecords = [];
          try {
            let accumulated = [], cursor = null;
            let crit = this.buildCriteria();
            do {
              let config = { report_name: this.REPORT_NAME, max_records: 200 };
              if (crit) config.criteria = crit;
              if (cursor) config.record_cursor = cursor;

              let res = await ZOHO.CREATOR.DATA.getRecords(config);
              if (res && res.code === 3000 && res.data) {
                accumulated = accumulated.concat(res.data);
                cursor = res.data.length >= 200 ? res.record_cursor : null;
              } else { cursor = null; }
            } while (cursor);
            this.allRecords = accumulated;
          } catch (err) { } finally {
            this.isLoading = false;
            this.computeStats();
          }
        },

        async computeStats() {
          let q = this.search.trim().replace(/'/g, "\\'");
          let searchCrit = q ? `(PO_Ref_Number.contains("${q}") || purchase_requisition_id.contains("${q}"))` : '';
          const build = (statusCrit) => [searchCrit, statusCrit].filter(Boolean).join(' && ');

          const map = [
            { key: 'total', crit: build('') },
            { key: 'pending', crit: build('(Status == "Pending" || Status == "Partially Received" || Status == "Submitted")') },
            { key: 'received', crit: build('(Status == "Fully Received")') },
            { key: 'rejected', crit: build('(Status == "Rejected")') }
          ];

          for (let m of map) {
            try {
              let config = { report_name: this.REPORT_NAME };
              if (m.crit) config.criteria = m.crit;
              let res = await ZOHO.CREATOR.DATA.getRecordCount(config);
              this.stats[m.key] = res.result ? res.result.records_count : 0;
            } catch (e) { this.stats[m.key] = 0; }
          }
        },

        async fetchItemMasters() {
          try {
            let res = await ZOHO.CREATOR.DATA.getRecords({ report_name: this.ITEMS_REPORT_NAME, criteria: 'status == "Active"', max_records: 200 });
            if (res.code === 3000) this.itemMasters = res.data;
          } catch (err) { }
        },
        async fetchUnitMasters() {
          try {
            let res = await ZOHO.CREATOR.DATA.getRecords({ report_name: this.UNIT_REPORT_NAME, max_records: 200 });
            if (res.code === 3000) this.unitMasters = res.data;
          } catch (err) { }
        },

        // --- Helpers ---
        setFilter(f) { this.filter = f; },
        toggleSort(col) {
          if (this.sortCol === col) this.sortDir = this.sortDir === 'desc' ? 'asc' : 'desc';
          else { this.sortCol = col; this.sortDir = col.includes('date') ? 'desc' : 'asc'; }
          this.page = 1;
        },
        formatINR(amount) {
          if (amount == null || isNaN(amount)) return '₹ 0';
          let num = parseFloat(amount).toFixed(0);
          if (num.length > 3) num = num.slice(0, -3).replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',' + num.slice(-3);
          return '₹ ' + num;
        },
        formatDate(dateStr) {
          if (!dateStr) return '–';
          const d = dayjs(dateStr, ["DD-MMM-YYYY", "YYYY-MM-DD"]);
          return d.isValid() ? d.format('DD MMM YYYY') : dateStr;
        },
        getStatusStyle(rec) {
          const st = (rec.Status || '').toLowerCase();
          if (st === 'fully received') return { classes: 'border-emerald-200 bg-emerald-50 text-emerald-800', dot: 'bg-emerald-600' };
          if (st === 'partially received') return { classes: 'border-cyan-200 bg-cyan-50 text-cyan-800', dot: 'bg-cyan-500' };
          if (st === 'rejected') return { classes: 'border-red-200 bg-red-50 text-red-800', dot: 'bg-red-600' };
          return { classes: 'border-amber-200 bg-amber-50 text-amber-800', dot: 'bg-amber-500' };
        },
        getSortValue(rec, col) {
          switch (col) {
            case 'po_number': return parseInt((rec.PO_Ref_Number || '').match(/\d+$/)?.[0] || 0, 10);
            case 'pr_ref': return (rec.purchase_requisition_id || '').toLowerCase();
            case 'amount': return parseFloat(String(rec.Total_Amount).replace(/[,\s]/g, '')) || 0;
            case 'order_date': return rec.order_date ? dayjs(rec.order_date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).valueOf() : 0;
            case 'delivery_date': return rec.delivery_date ? dayjs(rec.delivery_date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).valueOf() : 0;
            case 'status': return (rec.Status || '').toLowerCase();
            default: return '';
          }
        },
        getPagesArray() {
          let pages = [];
          for (let p = 1; p <= this.totalPages; p++) {
            if (p <= 2 || p === this.totalPages || (p >= this.page - 1 && p <= this.page + 1)) pages.push(p);
          }
          pages = [...new Set(pages)].sort((a, b) => a - b);
          let finalPages = [];
          for (let i = 0; i < pages.length; i++) {
            if (i > 0 && pages[i] - pages[i - 1] > 1) finalPages.push('…');
            finalPages.push(pages[i]);
          }
          return finalPages;
        },

        // --- Shared Item Functions ---
        addItemRow(type) {
          const arr = type === 'po' ? this.poForm.items : this.grnForm.items;
          arr.push({ uid: Date.now() + Math.random(), id: '', quantity: 1, amount: 0, comment: '' });
        },
        removeItemRow(index, type) {
          const arr = type === 'po' ? this.poForm.items : this.grnForm.items;
          const tsArr = type === 'po' ? this.tsInstances.poItems : this.tsInstances.grnItems;
          arr.splice(index, 1);
          if (tsArr[index]) { tsArr[index].destroy(); tsArr.splice(index, 1); }
        },
        initItemSelect(el, itemRef, type) {
          let ts = new TomSelect(el, {
            valueField: 'ID', labelField: 'item_name', searchField: 'item_name', options: this.itemMasters, maxItems: 1, placeholder: 'Search item...',
            onChange: (val) => {
              itemRef.id = val;
              let selectedItem = this.itemMasters.find(m => m.ID === val);
              if (selectedItem) {
                itemRef.unitPrice = parseFloat(selectedItem.unit_price) || 0;
                if (itemRef.quantity) {
                  itemRef.amount = Number((itemRef.quantity * itemRef.unitPrice).toFixed(2));
                }
              }
            }
          });
          if (itemRef.id) {
            if (!ts.options[itemRef.id]) ts.addOption({ ID: String(itemRef.id), item_name: itemRef.tempName || 'Item #' + itemRef.id });
            ts.setValue(itemRef.id);
          }
          if (type === 'po') this.tsInstances.poItems.push(ts);
          else this.tsInstances.grnItems.push(ts);
        },

        // --- PO Create Logic ---
        openCreateModal() {
          this.poForm = { dept: '', prRefId: '', prRefText: '', orderDate: dayjs().format('YYYY-MM-DD'), deliveryDate: '', remarks: '', discount: 0, items: [] };
          this.isModalOpen = true;
          this.$nextTick(() => { this.initDeptSelect(); this.initPrSelect(); this.addItemRow('po'); });
        },
        closeModal(type) {
          if (type === 'po') {
            this.isModalOpen = false;
            if (this.tsInstances.dept) this.tsInstances.dept.destroy();
            if (this.tsInstances.pr) this.tsInstances.pr.destroy();
            this.tsInstances.poItems.forEach(ts => ts && ts.destroy());
            this.tsInstances.poItems = [];
          } else {
            this.isGrnModalOpen = false;
            this.tsInstances.grnItems.forEach(ts => ts && ts.destroy());
            this.tsInstances.grnItems = [];
          }
        },
        initDeptSelect() {
          this.tsInstances.dept = new TomSelect(document.getElementById('poDept'), {
            valueField: 'ID', labelField: 'Name', searchField: 'Name', options: this.unitMasters, maxItems: 1, placeholder: 'Select Department...',
            onChange: (val) => { this.poForm.dept = val; }
          });
        },
        initPrSelect() {
          this.tsInstances.pr = new TomSelect(document.getElementById('poPrRef'), {
            valueField: 'ID', labelField: 'PR_Number', searchField: ['PR_Number', 'Requisition_Number'], maxItems: 1, placeholder: 'Search PR...', loadThrottle: 350,
            onChange: (val) => {
              this.poForm.prRefId = val;
              if (val && this.tsInstances.pr.options[val]) {
                this.poForm.prRefText = this.tsInstances.pr.options[val].PR_Number || this.tsInstances.pr.options[val].Requisition_Number;
                this.fetchPRDetailsForPO(val);
              }
            },
            load: (query, callback) => {
              if (!query.length) return callback();
              ZOHO.CREATOR.DATA.getRecords({ report_name: this.PR_REPORT_NAME, criteria: `(PR_Number.contains("${query.replace(/'/g, "\\'")}") || Requisition_Number.contains("${query.replace(/'/g, "\\'")}") )` })
                .then(res => callback(res.code === 3000 ? res.data : [])).catch(() => callback());
            }
          });
        },
        async fetchPRDetailsForPO(prId) {
          Toast.fire({ icon: 'info', title: 'Fetching PR items...' });
          try {
            let res = await ZOHO.CREATOR.DATA.invokeCustomApi({
              api_name: "Fetch_PR_Details", http_method: "GET", query_params: 'recId=' + prId,
            });
            if (res && res.result && res.result.length > 0) {
              const prData = res.result[0];
              const items = prData.Items || [];

              // Auto-set Date Fields if present in PR API response
              if (prData.PR_Date) this.poForm.orderDate = dayjs(prData.PR_Date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).format('YYYY-MM-DD');
              if (prData.Due_Date) this.poForm.deliveryDate = dayjs(prData.Due_Date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).format('YYYY-MM-DD');

              this.tsInstances.poItems.forEach(ts => ts && ts.destroy());
              this.tsInstances.poItems = [];
              this.poForm.items = [];

              if (items.length === 0) { this.addItemRow('po'); Toast.fire({ icon: 'warning', title: 'No items in PR' }); return; }
              items.forEach(prItem => {
                this.poForm.items.push({
                  uid: Date.now() + Math.random(), id: prItem.Item.ID, tempName: prItem.Item.item_name,
                  quantity: prItem.Quantity || 1, amount: 0, comment: ''
                });
              });
              Toast.fire({ icon: 'success', title: 'Items loaded from PR' });
            }
          } catch (err) { Toast.fire({ icon: 'error', title: 'Failed to fetch PR details' }); }
        },
        async submitPO() {
          if (!this.poForm.dept) { Toast.fire({ icon: 'error', title: 'Department is required.' }); return; }
          if (this.poForm.items.length === 0 || this.poForm.items.some(i => !i.id)) { Toast.fire({ icon: 'error', title: 'Please select valid items.' }); return; }

          this.isSubmitting = true;
          try {
            const payloadData = {
              Department: this.poForm.dept,
              order_date: dayjs(this.poForm.orderDate).format('DD-MMM-YYYY'),
              delivery_date: dayjs(this.poForm.deliveryDate).format('DD-MMM-YYYY'),
              Status: "Pending",
              Discount: this.poForm.discount || 0,
              Total_Amount: this.calculatedTotal,
              Remarks: this.poForm.remarks,
              Items: this.poForm.items.map(i => ({ Item: i.id, Quantity: i.quantity, Amount: i.amount, Comment: i.comment }))
            };
            if (this.poForm.prRefId) {
              payloadData.Purchase_Requisition = this.poForm.prRefId;
              payloadData.purchase_requisition_id = this.poForm.prRefText;
            }

            let res = await ZOHO.CREATOR.DATA.addRecords({ form_name: "Purchase_Order", payload: { data: payloadData } });
            if (res.code === 3000) {
              Toast.fire({ icon: 'success', title: 'Purchase Order Created!' });
              this.closeModal('po');
              this.search = '';
              this.fetchRecords();
            } else { throw new Error(res.message); }
          } catch (err) {
            Toast.fire({ icon: 'error', title: err.message || 'Submission failed.' });
          } finally { this.isSubmitting = false; }
        },


        async openGrnModal(rec) {
          this.isGrnModalOpen = true;
          this.isLoadingGrnDetails = true;

          // Initial map based on list view data (ensures safety if items fail to load)
          this.grnForm = {
            poId: rec.ID, poRefNum: rec.PO_Ref_Number || '',
            prId: rec.Purchase_Requisition?.ID || '', prRefNum: rec.purchase_requisition_id || '',
            orderDate: dayjs().format('YYYY-MM-DD'),
            deliveryDate: dayjs().format('YYYY-MM-DD'),
            remarks: '', discount: rec.Discount || 0, items: []
          };

          try {
            // Fetch full PO record using the Custom API
            let poRes = await ZOHO.CREATOR.DATA.invokeCustomApi({
              api_name: "Fetch_Po_Details",
              http_method: "GET",
              query_params: 'recId=' + rec.ID,
            });

            if (poRes && poRes.result && poRes.result.length > 0) {
              let poData = poRes.result[0];
              let poItems = poData.Items || [];

              if (typeof poItems === 'string') {
                try { poItems = JSON.parse(poItems); } catch (e) { poItems = []; }
              }

              if (poData.order_date) this.grnForm.orderDate = dayjs(poData.order_date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).format('YYYY-MM-DD');
              if (poData.delivery_date) this.grnForm.deliveryDate = dayjs(poData.delivery_date, ["DD-MMM-YYYY", "YYYY-MM-DD"]).format('YYYY-MM-DD');
              if (poData.Discount) this.grnForm.discount = parseFloat(poData.Discount) || 0;

              // --- NEW LOGIC: Calculate previously received quantities ---
              let receivedQtyMap = {};
              let grnRefs = rec.GRN_GRN_Ref_Number || [];

              if (grnRefs.length > 0) {
                // Fetch all linked GRNs in parallel
                let grnPromises = grnRefs.map(grn =>
                  ZOHO.CREATOR.DATA.invokeCustomApi({
                    api_name: "Fetch_GRN_Details",
                    http_method: "GET",
                    query_params: 'recId=' + grn.ID,
                  }).catch(() => null) // Prevent one failed GRN fetch from breaking the whole process
                );

                let grnResponses = await Promise.all(grnPromises);

                // Tally up the received quantities per item ID
                grnResponses.forEach(res => {
                  if (res && res.result && res.result.length > 0) {
                    let grnData = res.result[0];
                    let gItems = grnData.Items || [];
                    if (typeof gItems === 'string') {
                      try { gItems = JSON.parse(gItems); } catch (e) { gItems = []; }
                    }
                    gItems.forEach(gItem => {
                      let itemID = String(gItem.Item?.ID || gItem.Item);
                      let qty = parseFloat(gItem.Quantity) || 0;
                      receivedQtyMap[itemID] = (receivedQtyMap[itemID] || 0) + qty;
                    });
                  }
                });
              }

              // Clear previous instances securely
              this.tsInstances.grnItems.forEach(ts => ts && ts.destroy());
              this.tsInstances.grnItems = [];
              this.grnForm.items = [];

              // --- Populate items with remaining quantities ---
              if (poItems.length > 0) {
                poItems.forEach(poItem => {
                  let extractedId = String(poItem.Item?.ID || poItem.Item);
                  let extractedName = poItem.Item?.item_name || poItem.Item?.display_value || 'Item';

                  let originalQty = parseFloat(poItem.Quantity) || 1;
                  let originalAmount = parseFloat(poItem.Amount) || 0;
                  let receivedQty = receivedQtyMap[extractedId] || 0;
                  let remainingQty = originalQty - receivedQty;

                  // Only add the item to the GRN form if there is a pending quantity
                  if (remainingQty > 0) {
                    // Proportionally adjust the default amount for the remaining quantity
                    let unitPrice = originalQty > 0 ? originalAmount / originalQty : 0;
                    let remainingAmount = Number((unitPrice * remainingQty).toFixed(2));

                    this.grnForm.items.push({
                      uid: Date.now() + Math.random(),
                      id: extractedId,
                      tempName: extractedName,
                      quantity: remainingQty,
                      maxQuantity: remainingQty, // Caps the input so they can't over-receive
                      unitPrice: unitPrice,      // Stores the price for on-the-fly math
                      amount: remainingAmount,
                      comment: poItem.Comment || ''
                    });
                  }
                });
              }

              // Fallback if somehow all items calculate to 0 but the PO isn't marked "Fully Received"
              if (this.grnForm.items.length === 0) {
                Toast.fire({ icon: 'info', title: 'All items appear to be fully received.' });
                this.addItemRow('grn');
              }

            } else {
              throw new Error("No PO data returned from API.");
            }
          } catch (e) {
            console.error("Failed to load full PO context:", e);
            Toast.fire({ icon: 'warning', title: 'Could not fetch full PO/GRN items. Added a blank row.' });
            if (this.grnForm.items.length === 0) this.addItemRow('grn');
          } finally {
            this.isLoadingGrnDetails = false;
          }
        },

        async submitGRN() {
          if (this.grnForm.items.length === 0 || this.grnForm.items.some(i => !i.id)) { Toast.fire({ icon: 'error', title: 'Please select valid items.' }); return; }

          this.isGrnSubmitting = true;
          try {
            const payloadData = {
              order_date: dayjs(this.grnForm.orderDate).format('DD-MMM-YYYY'),
              delivery_date: dayjs(this.grnForm.deliveryDate).format('DD-MMM-YYYY'),
              status: "Submitted",
              PO_Reference: this.grnForm.poId,
              PO_Ref_Number: this.grnForm.poRefNum,
              Discount: this.grnForm.discount || 0,
              Total_Amount: this.calculatedGrnTotal,
              Remarks: this.grnForm.remarks,
              Items: this.grnForm.items.map(i => ({ Item: i.id, Quantity: i.quantity, Amount: i.amount, Comment: i.comment }))
            };

            // Safely push PR if it exists
            if (this.grnForm.prId) {
              payloadData.PR_Reference = this.grnForm.prId;
              payloadData.PR_Ref_Number = this.grnForm.prRefNum;
            }

            let res = await ZOHO.CREATOR.DATA.addRecords({ form_name: "GRN", payload: { data: payloadData } });
            if (res.code === 3000) {
              Toast.fire({ icon: 'success', title: 'GRN Submitted Successfully!' });
              this.closeModal('grn');
              this.fetchRecords(); // Refresh the PO Dashboard to reflect backend workflow updates automatically
            } else { throw new Error(res.message); }
          } catch (err) {
            Toast.fire({ icon: 'error', title: err.message || 'GRN Submission failed.' });
          } finally { this.isGrnSubmitting = false; }
        }
      }));
    });
  </script>
</body>
