<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <style>
        /* ── Loading spinner ── */
        .btn-spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.7s linear infinite;
        }

        .pr-spinner {
            border: 2.5px solid #e5e7eb;
            border-top-color: #1B5CA8;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Progress stepper connector ── */
        .step-connector {
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            height: 3px;
            background: #e5e7eb;
            z-index: 0;
        }

        .step-connector-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #1B5CA8;
            transition: width 0.6s ease;
        }

        /* ── Timeline connector ── */
        .timeline-line {
            position: absolute;
            left: 15px;
            top: 32px;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }

        .timeline-item:last-child .timeline-line {
            display: none;
        }

        /* ── Fade in ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.35s ease-out both;
        }
    </style>
</head>

<body class="bg-gray-50 p-6">
    <div id="actionModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity">
        <div
            class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden fade-in mx-4 border border-gray-200 flex flex-col max-h-[90vh]">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                <h3 id="modalTitle" class="text-[14px] font-bold text-gray-800">Submit Action</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-700 cursor-pointer transition-colors">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="p-5 bg-gray-50/50 overflow-y-auto flex-1">
                <div id="approvalItemsWrapper" class="hidden mb-5">
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-semibold text-gray-700">
                            Adjust Approved Quantities
                        </label>
                        <span class="text-[10px] text-gray-400 font-medium">Set quantity to 0 to remove item</span>
                    </div>
                    <div id="approvalItemsList"
                        class="bg-white border border-gray-200 rounded-lg shadow-sm divide-y divide-gray-100">
                    </div>
                </div>

                <label class="block text-xs font-semibold text-gray-700 mb-2">
                    Comment <span class="text-gray-400 font-normal text-[11px]">(Optional)</span>
                </label>
                <textarea id="actionComment" rows="3"
                    class="w-full border border-gray-300 rounded-lg p-3 text-[13px] text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#1B5CA8]/20 focus:border-[#1B5CA8] transition-all shadow-sm"
                    placeholder="Enter your remarks here..."></textarea>
            </div>

            <div class="px-5 py-3.5 bg-white flex justify-end gap-2.5 border-t border-gray-100 shrink-0">
                <button id="cancelActionBtn"
                    class="px-4 py-2 rounded-lg text-xs font-semibold bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors cursor-pointer shadow-sm">
                    Cancel
                </button>
                <button id="confirmActionBtn"
                    class="px-4 py-2 rounded-lg text-xs font-semibold text-white transition-colors cursor-pointer shadow-sm flex items-center gap-1.5">
                    <span id="confirmActionText">Submit</span>
                </button>
            </div>
        </div>
    </div>

    <div id="app" class="font-[Lato,sans-serif] text-[13px] text-gray-700 antialiased max-w-5xl mx-auto">

        <div id="loadingState" class="flex flex-col items-center justify-center py-24 gap-3">
            <div class="pr-spinner"></div>
            <div class="text-sm text-gray-400 font-medium">Loading PR details…</div>
        </div>

        <div id="errorState" class="hidden text-center py-24">
            <i class="bi bi-alert-circle text-4xl text-red-400 mb-3 block"></i>
            <div class="text-sm font-medium text-gray-600">Failed to load PR details</div>
            <div class="text-xs text-gray-400 mt-1">Please check the record ID and try again.</div>
        </div>

        <div id="mainContent" class="hidden">
            <div class="mb-5">
                <nav class="flex items-center gap-1.5 text-xs mb-2.5">
                    <button
                        onclick="ZOHO.CREATOR.UTIL.navigateParentURL({action:'open',window:'same',url:'#Page:PR_Approval'})"
                        class=" text-[#1B5CA8] hover:text-[#14457e] font-medium transition-colors no-underline cursor-pointer">
                        Purchase Requisitions
                    </button>
                    <i class="bi bi-chevron-right text-[11px] text-gray-400"></i>
                    <span class="text-gray-500 font-medium" id="breadcrumbPrNum">–</span>
                </nav>
                <div class="flex items-center gap-2.5">
                    <h1 class="text-[17px] font-bold text-gray-900 leading-none" id="headerPrNum">–</h1>
                    <span id="headerBadge"></span>
                </div>
                <div class="text-xs text-gray-400 mt-1" id="headerSub">–</div>
            </div>

            <div class="bg-white border border-gray-200 rounded-lg p-5 mb-4 fade-in">
                <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-4">PR Process Progress
                </div>
                <div class="relative flex justify-between items-start" id="progressContainer">
                    <div class="step-connector">
                        <div class="step-connector-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-5 gap-4">
                <div class="col-span-3 space-y-4">
                    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden fade-in">
                        <div class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50">
                            <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                                <div
                                    class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-[#EBF3FC] text-[#1B5CA8]">
                                    <i class="bi bi-file-text"></i>
                                </div>
                                Requisition Details
                            </div>
                        </div>
                        <div class="px-[18px] py-[15px]" id="prDetailsBody"></div>
                    </div>

                    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden fade-in">
                        <div class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50">
                            <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                                <div
                                    class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-[#EBF3FC] text-[#1B5CA8]">
                                    <i class="bi bi-list-ul"></i>
                                </div>
                                <span>Requested Line Items</span>
                            </div>
                        </div>
                        <div id="requestedItemsTableBody"></div>
                    </div>

                    <div id="approvedItemsCard"
                        class="hidden bg-white border border-gray-200 rounded-lg overflow-hidden fade-in">
                        <div class="px-[18px] py-[13px] border-b border-gray-200 bg-emerald-50/60">
                            <div class="text-[12px] font-semibold text-emerald-800 flex items-center gap-2">
                                <div
                                    class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-emerald-100 text-emerald-700">
                                    <i class="bi bi-check2-square"></i>
                                </div>
                                <span>Approved Line Items</span>
                            </div>
                        </div>
                        <div id="approvedItemsTableBody"></div>
                    </div>

                    <div class="flex items-center gap-2.5 fade-in" id="actionButtons" style="display:none;">
                        <button id="approveBtn"
                            class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-emerald-600 text-white border border-emerald-600 hover:bg-emerald-700 transition-colors no-underline cursor-pointer shadow-sm">
                            <i class="bi bi-check-lg"></i> <span class="btn-text">Approve</span>
                        </button>
                        <button id="rejectBtn"
                            class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-white text-red-600 border border-red-300 hover:bg-red-50 transition-colors no-underline cursor-pointer shadow-sm">
                            <i class="bi bi-x-lg"></i> Reject
                        </button>
                        <button id="cancelBtn"
                            class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors no-underline cursor-pointer shadow-sm">
                            <i class="bi bi-slash-circle"></i> Cancel
                        </button>
                    </div>
                </div>

                <div class="col-span-2 space-y-4">

                    <div id="attachmentsCard"
                        class="hidden bg-white border border-gray-200 rounded-lg overflow-hidden fade-in">
                        <div class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50">
                            <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                                <div
                                    class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-indigo-50 text-indigo-600">
                                    <i class="bi bi-paperclip"></i>
                                </div>
                                Attachments
                            </div>
                        </div>
                        <div class="px-[18px] py-[15px]" id="attachmentsBody">
                        </div>
                    </div>

                    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden fade-in">
                        <div class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50">
                            <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                                <div
                                    class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-amber-50 text-amber-600">
                                    <i class="bi bi-clock-history"></i>
                                </div>
                                Audit Trail
                            </div>
                        </div>
                        <div class="px-[18px] py-[15px]" id="auditTrailBody"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            const PROCESS_STEPS = [
                { key: 'purchase_requisition', label: 'Purchase Requisition', icon: 'bi-receipt' },
                { key: 'request_for_quotation', label: 'Request For Quotation', icon: 'bi-bucket' },
                { key: 'quote_comparison', label: 'Quote Comparison', icon: 'bi-shop-window' },
                { key: 'purchase_order', label: 'Purchase Order', icon: 'bi-cart-check' },
                { key: 'grn', label: 'GRN', icon: 'bi-box-seam' },
                { key: 'bill', label: 'Bill', icon: 'bi-coin' },
                { key: 'payment', label: 'Payment', icon: 'bi-cash' }
            ];

            const $loading = document.getElementById('loadingState');
            const $error = document.getElementById('errorState');
            const $main = document.getElementById('mainContent');
            const $headerPrNum = document.getElementById('headerPrNum');
            const $headerBadge = document.getElementById('headerBadge');
            const $headerSub = document.getElementById('headerSub');
            const $progressContainer = document.getElementById('progressContainer');
            const $progressFill = document.getElementById('progressFill');
            const $prDetails = document.getElementById('prDetailsBody');
            const $requestedItemsTableBody = document.getElementById('requestedItemsTableBody');
            const $approvedItemsCard = document.getElementById('approvedItemsCard');
            const $approvedItemsTableBody = document.getElementById('approvedItemsTableBody');
            const $actionButtons = document.getElementById('actionButtons');
            const $auditTrail = document.getElementById('auditTrailBody');
            const $attachmentsCard = document.getElementById('attachmentsCard');
            const $attachmentsBody = document.getElementById('attachmentsBody');
            const $breadcrumbPrNum = document.getElementById('breadcrumbPrNum');
            const $approveBtn = document.getElementById('approveBtn');
            const $rejectBtn = document.getElementById('rejectBtn');
            const $cancelBtn = document.getElementById('cancelBtn');

            function esc(str) {
                if (str == null || str === '') return '–';
                const div = document.createElement('div');
                div.textContent = String(str);
                return div.innerHTML;
            }

            function formatDate(dateStr) {
                if (!dateStr) return '–';
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return String(d.getDate()).padStart(2, '0') + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
                } catch (e) {
                    return dateStr;
                }
            }

            function getDisplayName(field) {
                if (!field) return '–';
                if (typeof field === 'object' && field.display_value) return field.display_value;
                if (typeof field === 'object' && field.first_name) {
                    return ((field.first_name || '') + ' ' + (field.last_name || '')).trim() || '–';
                }
                return String(field);
            }

            function normalizeStatus(status) {
                if (!status) return 'submitted';
                const s = status.toLowerCase();
                if (s === 'submitted' || s === 'draft') return 'submitted';
                if (s === 'approved') return 'approved';
                if (s === 'rejected') return 'rejected';
                if (s === 'cancelled') return 'cancelled';
                return 'submitted';
            }

            function getStatusBadgeHTML(status) {
                const norm = normalizeStatus(status);
                const config = {
                    submitted: { border: 'border-amber-200', bg: 'bg-amber-50', text: 'text-amber-800', dot: 'bg-amber-500', label: status || 'Submitted' },
                    approved: { border: 'border-emerald-200', bg: 'bg-emerald-50', text: 'text-emerald-800', dot: 'bg-emerald-600', label: status || 'Approved' },
                    rejected: { border: 'border-red-200', bg: 'bg-red-50', text: 'text-red-800', dot: 'bg-red-600', label: 'Rejected' },
                    cancelled: { border: 'border-gray-300', bg: 'bg-gray-100', text: 'text-gray-700', dot: 'bg-gray-500', label: 'Cancelled' },
                };
                const c = config[norm] || config.submitted;
                return '<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold tracking-wide border ' + c.border + ' ' + c.bg + ' ' + c.text + '"><span class="w-[5px] h-[5px] rounded-full ' + c.dot + ' shrink-0"></span>' + esc(c.label) + '</span>';
            }

            function stageToStepKey(stage) {
                if (!stage) return null;
                const s = stage.toLowerCase().trim();
                if (s === 'purchase requisition') return 'purchase_requisition';
                if (s === 'request for quotation') return 'request_for_quotation';
                if (s === 'quote comparison') return 'quote_comparison';
                if (s === 'purchase order') return 'purchase_order';
                if (s === 'grn') return 'grn';
                if (s === 'bill') return 'bill';
                if (s === 'payment') return 'payment';
                return null;
            }

            function renderProgress(rec, actions) {
                var currentStageKey = stageToStepKey(rec.Current_Stage);
                var completed = { 'purchase_requisition': true };
                var rejectedStepKey = null;

                if (actions && actions.length) {
                    actions.forEach(function (action) {
                        var stepKey = stageToStepKey(action.Moved_To);
                        if (stepKey) {
                            if (action.Status && action.Status.toLowerCase() === 'rejected') {
                                rejectedStepKey = stepKey;
                            } else {
                                completed[stepKey] = true;
                            }
                        }
                    });
                }

                var rejectedIdx = -1;
                if (rejectedStepKey) {
                    PROCESS_STEPS.forEach(function (step, i) {
                        if (step.key === rejectedStepKey) rejectedIdx = i;
                    });
                }

                var currentIdx = 0;
                if (currentStageKey) {
                    PROCESS_STEPS.forEach(function (step, i) {
                        if (step.key === currentStageKey) currentIdx = i;
                    });
                } else {
                    PROCESS_STEPS.forEach(function (step, i) {
                        if (completed[step.key] && i > currentIdx) currentIdx = i;
                    });
                }

                var isRejected = (rejectedIdx !== -1);
                var fillIdx = isRejected ? rejectedIdx : currentIdx;

                var stepsHtml = '';
                PROCESS_STEPS.forEach(function (step, i) {
                    var isRejectedStep = (i === rejectedIdx);
                    var isDone = isRejected ? (i < rejectedIdx) : (i <= currentIdx);
                    var isCurrent = (i === currentIdx) && !isRejectedStep;

                    var circleClass, labelClass;
                    if (isRejectedStep) {
                        circleClass = 'bg-red-600 text-white border-red-600 shadow-md shadow-red-200';
                        labelClass = 'text-red-700 font-semibold';
                    } else if (isDone && isCurrent) {
                        circleClass = 'bg-[#1B5CA8] text-white border-[#1B5CA8] shadow-md shadow-blue-200';
                        labelClass = 'text-[#1B5CA8] font-semibold';
                    } else if (isDone) {
                        circleClass = 'bg-emerald-600 text-white border-emerald-600';
                        labelClass = 'text-gray-700 font-medium';
                    } else {
                        circleClass = 'bg-white text-gray-400 border-gray-300';
                        labelClass = 'text-gray-400';
                    }

                    var iconHtml = isRejectedStep ? '<i class="bi bi-x-lg text-[13px]"></i>'
                        : (isDone && !isCurrent) ? '<i class="bi bi-check-lg text-[13px]"></i>'
                            : '<i class="bi ' + step.icon + ' text-[13px]"></i>';
                    var stepLabel = isRejectedStep ? 'Rejected' : step.label;

                    stepsHtml += '<div class="flex flex-col items-center relative z-10" style="width: ' + (100 / PROCESS_STEPS.length) + '%">'
                        + '<div class="w-[30px] h-[30px] rounded-full border-2 flex items-center justify-center text-[13px] ' + circleClass + ' transition-all duration-300">'
                        + iconHtml
                        + '</div>'
                        + '<div class="text-[10px] mt-1.5 text-center leading-tight ' + labelClass + '">'
                        + stepLabel
                        + '</div></div>';
                });

                var oldSteps = $progressContainer.querySelectorAll('.flex.flex-col');
                oldSteps.forEach(function (el) { el.remove(); });
                $progressContainer.insertAdjacentHTML('beforeend', stepsHtml);

                $progressFill.style.width = ((fillIdx / (PROCESS_STEPS.length - 1)) * 100) + '%';
                $progressFill.style.background = isRejected ? '#dc2626' : '#1B5CA8';
            }

            function renderPRDetails(rec) {
                var prNum = rec.PR_Number || 'PR-' + rec.Requisition_Number;
                $headerPrNum.textContent = prNum;
                $breadcrumbPrNum.textContent = prNum;
                $headerBadge.innerHTML = getStatusBadgeHTML(rec.Status) + (rec.Current_Stage ? ' <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium tracking-wide border border-blue-200 bg-blue-50 text-blue-700"><i class="bi bi-geo-alt text-[10px]"></i>' + esc(rec.Current_Stage) + '</span>' : '');
                $headerSub.textContent = (rec.Department || '–') + ' · Requested ' + formatDate(rec.PR_Date);

                var fields = [
                    { label: 'PR Number', value: prNum },
                    { label: 'Department', value: rec.Department },
                    { label: 'Requester', value: getDisplayName(rec.Added_User) },
                    { label: 'PR Date', value: formatDate(rec.PR_Date) },
                    { label: 'Due Date', value: formatDate(rec.Due_Date) },
                    { label: 'Status', value: null, html: getStatusBadgeHTML(rec.Status) },
                ];

                var html = '<div class="grid grid-cols-2 gap-x-6 gap-y-0">';
                fields.forEach(function (f) {
                    html += '<div class="flex justify-between items-center py-2 text-xs border-b border-dashed border-gray-100">'
                        + '<span class="text-gray-500 font-medium">' + f.label + '</span>'
                        + (f.html ? '<span>' + f.html + '</span>' : '<span class="text-gray-900 ' + (f.bold ? 'font-bold text-[13px]' : 'font-semibold') + '">' + esc(f.value) + '</span>')
                        + '</div>';
                });
                html += '</div>';

                if (rec.Description) {
                    html += '<div class="mt-4 pt-3 border-t border-gray-100">'
                        + '<div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-2">Description</div>'
                        + '<div class="text-xs text-gray-700 leading-relaxed max-w-none">' + esc(rec.Description) + '</div>'
                        + '</div>';
                }
                $prDetails.innerHTML = html;
            }

            function renderTable(items, targetElement) {
                if (!items || !items.length) {
                    targetElement.innerHTML = '<div class="px-[18px] py-8 text-center text-gray-400 text-xs">'
                        + '<i class="bi bi-box-seam text-xl mb-1 block"></i>No line items</div>';
                    return;
                }

                var html = '<table class="w-full border-collapse text-xs">'
                    + '<thead><tr class="bg-gray-50 border-b border-gray-200">'
                    + '<th class="px-4 py-2 text-[11px] font-semibold text-gray-500 uppercase tracking-wide text-left">#</th>'
                    + '<th class="px-4 py-2 text-[11px] font-semibold text-gray-500 uppercase tracking-wide text-left">Item</th>'
                    + '<th class="px-4 py-2 text-[11px] font-semibold text-gray-500 uppercase tracking-wide text-right">Qty</th>'
                    + '</tr></thead><tbody>';

                items.forEach(function (item, i) {
                    var rawItem = item.Item;
                    var itemName = (rawItem && typeof rawItem === 'object') ? (rawItem.display_value || rawItem.item_name || '-') : (rawItem ? 'Item #' + rawItem : '-');
                    var qty = item.Quantity || 0;
                    var comment = item.Comment || '';

                    html += '<tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">'
                        + '<td class="px-4 py-2.5 text-gray-400 font-mono w-8">' + (i + 1) + '</td>'
                        + '<td class="px-4 py-2.5 text-gray-900 font-medium">' + esc(itemName)
                        + (comment ? '<div class="text-[11px] text-gray-400 font-normal mt-0.5">' + esc(comment) + '</div>' : '')
                        + '</td>'
                        + '<td class="px-4 py-2.5 text-gray-700 text-right tabular-nums w-24">' + esc(qty) + '</td>'
                        + '</tr>';
                });

                html += '</tbody></table>';
                targetElement.innerHTML = html;
            }

            function renderActionButtons(rec) {
                var isRejected = rec.Status && rec.Status.toLowerCase() === 'rejected';
                var isApproved = rec.Status && rec.Status.toLowerCase() === 'approved';
                var isPRStage = rec.Current_Stage === 'Purchase Requisition';
                $actionButtons.style.display = (isPRStage && !isRejected && !isApproved) ? 'flex' : 'none';
            }

            function renderAuditTrail(actions, prRec) {
                if (!actions || actions.length === 0) {
                    $auditTrail.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="bi bi-clock-history-off text-xl mb-1.5 block"></i><div class="text-xs font-medium text-gray-500">No activity recorded yet</div></div>';
                    return;
                }
                var sorted = actions.slice().sort(function (a, b) { return (parseInt(a.ID) || 0) - (parseInt(b.ID) || 0); });
                var html = '<div class="space-y-0">';

                sorted.forEach(function (action) {
                    var status = action.Status || '–';
                    var stage = action.Moved_To || '–';
                    var comment = action.Comment || '';
                    var performer = action.Added_User || '-';
                    var addedTime = action.Added_Time ? formatDate(action.Added_Time) : '–';

                    var iconBg = (status === 'Approved') ? 'bg-emerald-50' : (status === 'Rejected') ? 'bg-red-50' : 'bg-blue-50';
                    var iconColor = (status === 'Approved') ? 'text-emerald-600' : (status === 'Rejected') ? 'text-red-600' : 'text-blue-600';
                    var iconName = (status === 'Approved') ? 'bi-check-lg' : (status === 'Rejected') ? 'bi-x-lg' : 'bi-arrow-right';

                    var stageBg = 'bg-gray-100 text-gray-600 border-gray-200';
                    var stageKey = stageToStepKey(stage);
                    if (stageKey === 'purchase_order') stageBg = 'bg-blue-50 text-blue-700 border-blue-200';
                    else if (stageKey === 'grn') stageBg = 'bg-violet-50 text-violet-700 border-violet-200';

                    var initials = performer !== '–' ? performer.charAt(0).toUpperCase() : '?';

                    html += '<div class="bimeline-item relative pl-10 pb-5">'
                        + '<div class="absolute left-0 top-0 w-[30px] h-[30px] rounded-full ' + iconBg + ' flex items-center justify-center border-2 border-white shadow-sm z-10">'
                        + '<i class="bi ' + iconName + ' text-[13px] ' + iconColor + '"></i></div>'
                        + '<div class="bg-gray-50 border border-gray-200 rounded-lg px-3.5 py-3">'
                        + '<div class="flex items-center justify-between mb-1.5">'
                        + '<div class="flex items-center gap-2">'
                        + '<span class="text-xs font-semibold ' + ((status === 'Approved') ? 'text-emerald-700' : status === 'Rejected' ? 'text-red-700' : 'text-gray-700') + '">' + esc(status) + '</span>'
                        + '<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium border ' + stageBg + '"><i class="bi bi-arrow-right text-[9px] mr-1 opacity-60"></i>' + esc(stage) + '</span>'
                        + '</div><span class="text-[10px] text-gray-400">' + esc(addedTime) + '</span></div>'
                        + (comment ? '<div class="text-xs text-gray-600 mt-1.5">' + esc(comment) + '</div>' : '')
                        + '<div class="flex items-center gap-1.5 mt-2 text-[11px] text-gray-500">'
                        + '<div class="w-[18px] h-[18px] rounded-full bg-[#1B5CA8] text-white flex items-center justify-center text-[9px] font-bold">' + initials + '</div>'
                        + '<span class="font-medium">' + esc(performer) + '</span></div></div></div>';
                });
                html += '</div>';
                $auditTrail.innerHTML = html;
            }

            // Function to render the Attachment UI
            function renderAttachments(attachmentData, recordId) {
                // Ensure there is attachment data before rendering
                if (!attachmentData) return;

                // Normalize to an array
                let attachments = Array.isArray(attachmentData) ? attachmentData : [attachmentData];

                let html = '<div class="space-y-3">';

                attachments.forEach(function (att) {
                    let fullPath = (typeof att === 'object' && att !== null) ? (att.display_value || att.ID || att) : att;
                    let filePath = fullPath;
                    if (typeof fullPath === 'string' && fullPath.includes('filepath=')) {
                        filePath = fullPath.split('filepath=')[1].split('&')[0];
                    }

                    let displayName = filePath;
                    let parts = filePath.split('_');
                    if (parts.length > 1 && !isNaN(parts[0])) {
                        displayName = parts.slice(1).join('_');
                    }

                    html += `
                        <div class="flex items-center justify-between p-3 border border-gray-100 rounded-lg bg-white shadow-sm hover:shadow transition-shadow">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center">
                                    <i class="bi bi-file-earmark-text text-[15px]"></i>
                                </div>
                                <div>
                                    <div class="text-xs font-semibold text-gray-800 truncate max-w-[150px]" title="${esc(displayName)}">${esc(displayName)}</div>
                                </div>
                            </div>
                            <button onclick="downloadAttachment('${filePath}', '${recordId}')" class="px-2.5 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 rounded text-[11px] font-semibold transition-colors flex items-center gap-1.5 cursor-pointer">
                                <i class="bi bi-download"></i> Download
                            </button>
                        </div>
                    `;
                });

                html += '</div>';

                $attachmentsBody.innerHTML = html;
            }

            function getMimeType(filename) {
                var ext = filename.split('.').pop().toLowerCase();
                var map = {
                    pdf: 'application/pdf',
                    png: 'image/png',
                    jpg: 'image/jpeg',
                    jpeg: 'image/jpeg',
                    gif: 'image/gif',
                    doc: 'application/msword',
                    docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                    xls: 'application/vnd.ms-excel',
                    xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                    txt: 'text/plain',
                    csv: 'text/csv',
                    zip: 'application/zip'
                };
                return map[ext] || 'application/octet-stream';
            }

            var pendingAction = { recordId: null, status: '', movedTo: '', requestedItemsData: [] };

            function fetchPRDetail(recordId) {
                $loading.classList.remove('hidden');
                $error.classList.add('hidden');
                $main.classList.add('hidden');

                Promise.all([
                    ZOHO.CREATOR.DATA.getRecordById({
                        report_name: "Purchase_Requisition_Report",
                        id: recordId
                    }).catch(function () { return { data: {} }; }),
                    ZOHO.CREATOR.DATA.invokeCustomApi({
                        api_name: "Fetch_PR_Details",
                        http_method: "GET",
                        content_type: "application/json",
                        query_params: 'recId=' + recordId
                    })
                ]).then(function (responses) {
                    var recordRes = responses[0];
                    var apiRes = responses[1];

                    if (!apiRes || !apiRes.result || apiRes.result.length === 0) {
                        $loading.classList.add('hidden');
                        $error.classList.remove('hidden');
                        return;
                    }

                    var rec = apiRes.result[0];
                    pendingAction.recordId = recordId;
                    pendingAction.requestedItemsData = rec.Requested_Items || [];

                    renderPRDetails(rec);
                    renderActionButtons(rec);

                    // Render Attachments conditionally based on getRecordById response
                    var attachments = recordRes.data && recordRes.data.Attachments;
                    if (attachments && attachments.length > 0) {
                        $attachmentsCard.classList.remove('hidden');
                        renderAttachments(attachments, pendingAction.recordId);
                    } else {
                        $attachmentsCard.classList.add('hidden');
                    }

                    // Always render Requested Items
                    renderTable(pendingAction.requestedItemsData, $requestedItemsTableBody);

                    // Conditionally display Approved Items
                    if (rec.Items && rec.Items.length > 0) {
                        $approvedItemsCard.classList.remove('hidden');
                        renderTable(rec.Items, $approvedItemsTableBody);
                    } else {
                        $approvedItemsCard.classList.add('hidden');
                    }

                    var actions = (rec.PR_Actions && rec.PR_Actions.length) ? rec.PR_Actions : [];
                    renderProgress(rec, actions);
                    renderAuditTrail(actions, rec);

                    $loading.classList.add('hidden');
                    $main.classList.remove('hidden');

                    let rfqRequested = rec.Request_For_Quotation === "Yes" || false;
                    $approveBtn.querySelector('span').textContent = rfqRequested ? "Approve & Submit For RFQ" : "Approve & Submit";

                    $approveBtn.onclick = function () {
                        openActionModal("Approve PR", "Approved", rfqRequested ? "Request For Quotation" : "Purchase Order", "bg-emerald-600", "hover:bg-emerald-700");
                    };
                    $rejectBtn.onclick = function () {
                        openActionModal("Reject PR", "Rejected", "Request For Quotation", "bg-red-600", "hover:bg-red-700");
                    };
                    $cancelBtn.onclick = function () {
                        ZOHO.CREATOR.UTIL.navigateParentURL({ action: 'open', window: 'same', url: '#Page:PR_Approval' });
                    };
                }).catch(function (err) {
                    console.error('Error loading PR:', err);
                    $loading.classList.add('hidden');
                    $error.classList.remove('hidden');
                });
            }

            function loadPrDetails() {
                ZOHO.CREATOR.UTIL.getQueryParams().then(function (params) {
                    var recordId = params && params.recordId ? params.recordId : null;
                    if (!recordId) {
                        $loading.classList.add('hidden');
                        $error.classList.remove('hidden');
                        return;
                    }
                    fetchPRDetail(recordId);
                });
            }
            loadPrDetails();

            const $actionModal = document.getElementById('actionModal');
            const $modalTitle = document.getElementById('modalTitle');
            const $actionComment = document.getElementById('actionComment');
            const $confirmActionBtn = document.getElementById('confirmActionBtn');
            const $confirmActionText = document.getElementById('confirmActionText');
            const $cancelActionBtn = document.getElementById('cancelActionBtn');
            const $closeModalBtn = document.getElementById('closeModalBtn');
            const $approvalItemsWrapper = document.getElementById('approvalItemsWrapper');
            const $approvalItemsList = document.getElementById('approvalItemsList');

            function openActionModal(title, status, movedTo, btnBgClass, btnHoverClass) {
                $modalTitle.textContent = title;
                $actionComment.value = '';
                pendingAction.status = status;
                pendingAction.movedTo = movedTo;

                $confirmActionBtn.disabled = false;
                $confirmActionBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                $confirmActionText.textContent = title.split(' ')[0];
                $confirmActionBtn.className = 'px-4 py-2 rounded-lg text-xs font-semibold text-white transition-colors cursor-pointer shadow-sm flex items-center gap-1.5 ' + btnBgClass + ' ' + btnHoverClass;

                // Render Item Adjustments only if Approving
                if (status === 'Approved' && pendingAction.requestedItemsData.length > 0) {
                    $approvalItemsWrapper.classList.remove('hidden');

                    var listHtml = '';
                    pendingAction.requestedItemsData.forEach(function (item, index) {
                        var rawItem = item.Item;
                        var itemName = (rawItem && typeof rawItem === 'object') ? (rawItem.display_value || rawItem.item_name || '-') : ('Item #' + rawItem);
                        var reqQty = item.Quantity || 0;

                        listHtml += '<div class="approve-item-row p-3 border-b border-gray-100 last:border-0" data-index="' + index + '">' +
                            '<div class="flex items-center justify-between">' +
                            '<div class="flex-1 min-w-0 pr-4">' +
                            '<div class="text-[13px] font-medium text-gray-900 truncate mb-0.5">' + esc(itemName) + '</div>' +
                            '<div class="text-[11px] text-gray-500">Requested Qty: <span class="font-semibold">' + esc(reqQty) + '</span></div>' +
                            '</div>' +
                            '<div class="w-24 shrink-0 relative">' +
                            '<label class="absolute -top-1 left-2 bg-white px-1 text-[9px] font-semibold text-gray-400 uppercase">Qty</label>' +
                            '<input type="number" class="approve-qty-input w-full border border-gray-300 rounded-md py-1.5 px-3 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#1B5CA8]/20 focus:border-[#1B5CA8] transition-all shadow-sm" ' +
                            'value="' + esc(reqQty) + '" max="' + esc(reqQty) + '" min="0">' +
                            '</div>' +
                            '</div>' +
                            '<div class="qty-warning hidden mt-1.5 text-[11px] text-red-500 font-medium text-right flex justify-end items-center gap-1">' +
                            '<i class="bi bi-exclamation-triangle"></i> Cannot exceed requested qty (' + esc(reqQty) + ')' +
                            '</div>' +
                            '</div>';
                    });
                    $approvalItemsList.innerHTML = listHtml;

                    // Bind dynamic warning and logic
                    var inputs = $approvalItemsList.querySelectorAll('.approve-qty-input');
                    inputs.forEach(function (input) {
                        input.addEventListener('input', function () {
                            var val = parseInt(this.value, 10) || 0;
                            var max = parseInt(this.getAttribute('max'), 10) || 0;
                            var warning = this.closest('.approve-item-row').querySelector('.qty-warning');

                            // Visual Warnings
                            if (val > max) {
                                warning.classList.remove('hidden');
                                this.classList.add('border-red-400', 'focus:border-red-500', 'focus:ring-red-500/20');
                                this.classList.remove('border-gray-300', 'focus:border-[#1B5CA8]', 'focus:ring-[#1B5CA8]/20');
                            } else {
                                warning.classList.add('hidden');
                                this.classList.remove('border-red-400', 'focus:border-red-500', 'focus:ring-red-500/20');
                                this.classList.add('border-gray-300', 'focus:border-[#1B5CA8]', 'focus:ring-[#1B5CA8]/20');
                            }

                            // Validate global state for Submit button
                            var hasError = Array.from(inputs).some(function (inp) {
                                return (parseInt(inp.value, 10) || 0) > (parseInt(inp.getAttribute('max'), 10) || 0);
                            });

                            $confirmActionBtn.disabled = hasError;
                            if (hasError) {
                                $confirmActionBtn.classList.add('opacity-50', 'cursor-not-allowed');
                            } else {
                                $confirmActionBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            }
                        });
                    });

                } else {
                    $approvalItemsWrapper.classList.add('hidden');
                    $approvalItemsList.innerHTML = '';
                }

                $actionModal.classList.remove('hidden');
            }

            function closeActionModal() {
                $actionModal.classList.add('hidden');
            }

            $cancelActionBtn.onclick = closeActionModal;
            $closeModalBtn.onclick = closeActionModal;

            $confirmActionBtn.onclick = function () {
                var commentVal = $actionComment.value.trim();
                $confirmActionBtn.disabled = true;
                $confirmActionBtn.innerHTML = '<div class="btn-spinner mr-1"></div> Submitting...';

                // If user is Approving, we must first update the PR with the revised Approved Items grid.
                if (pendingAction.status === 'Approved') {
                    var finalApprovedItems = [];
                    var itemRows = document.querySelectorAll('.approve-item-row');
                    var isPartiallyApproved = false;

                    itemRows.forEach(function (row) {
                        var index = row.getAttribute('data-index');
                        var originalItem = pendingAction.requestedItemsData[index];
                        var inputEl = row.querySelector('.approve-qty-input');
                        var approvedQty = parseInt(inputEl.value, 10) || 0;
                        var originalQty = parseInt(originalItem.Quantity, 10) || 0;

                        // Flag partial approvals
                        if (approvedQty < originalQty) {
                            isPartiallyApproved = true;
                        }

                        if (approvedQty > 0) {
                            var rawItem = originalItem.Item;
                            var itemId = typeof rawItem === 'object' ? rawItem.ID : rawItem;

                            var payloadItem = {
                                "Item": itemId,
                                "Quantity": approvedQty
                            };

                            if (originalItem.Due_Date && originalItem.Due_Date.trim() !== '' && originalItem.Due_Date !== '-') {
                                payloadItem["Due_Date"] = originalItem.Due_Date;
                            }
                            if (originalItem.Comment && originalItem.Comment.trim() !== '' && originalItem.Comment !== '-') {
                                payloadItem["Comment"] = originalItem.Comment;
                            }

                            finalApprovedItems.push(payloadItem);
                        }
                    });

                    // Update the final status based on logic
                    var itemApprovalStatus = isPartiallyApproved ? "Partially Approved" : "Approved";

                    var prActionConfig = {
                        form_name: "PR_Action",
                        payload: {
                            "data": {
                                "PR_Number": pendingAction.recordId,
                                "Status": "Approved",
                                "Moved_To": pendingAction.movedTo,
                                "Comment": commentVal
                            }
                        }
                    };

                    // IMPORTANT: You may need to change "Purchase_Requisition_Report" to match your exact Report Name.
                    var updatePrConfig = {
                        report_name: "Purchase_Requisition_Report",
                        id: pendingAction.recordId,
                        payload: {
                            data: {
                                "Status": "Approved",
                                "Items": finalApprovedItems,
                                "Items_Approval_Status": itemApprovalStatus,
                            }
                        }
                    };

                    // 1. Update the items grid
                    ZOHO.CREATOR.DATA.updateRecordById(updatePrConfig).then(function (updateResponse) {
                        if (updateResponse.code === 3000) {
                            // 2. Add the PR Action upon successful update
                            return ZOHO.CREATOR.DATA.addRecords(prActionConfig);
                        } else {
                            throw new Error("Failed to update approved items");
                        }
                    }).then(function (actionResponse) {
                        if (actionResponse.code === 3000) {
                            closeActionModal();
                            loadPrDetails();
                        } else {
                            throw new Error("Failed to add PR action");
                        }
                    }).catch(function (err) {
                        console.error("API Error: ", err);
                        alert("An error occurred while approving. Please try again.");
                        $confirmActionBtn.disabled = false;
                        $confirmActionText.textContent = "Approve";
                    });
                } else {
                    // For rejections, just create the PR_Action directly
                    var rejectActionConfig = {
                        form_name: "PR_Action",
                        payload: {
                            "data": {
                                "PR_Number": pendingAction.recordId,
                                "Status": pendingAction.status,
                                "Moved_To": pendingAction.movedTo,
                                "Comment": commentVal
                            }
                        }
                    };

                    ZOHO.CREATOR.DATA.addRecords(rejectActionConfig).then(function (response) {
                        if (response.code === 3000) {
                            closeActionModal();
                            loadPrDetails();
                        } else {
                            alert("Failed to process rejection. Please try again.");
                            $confirmActionBtn.disabled = false;
                            $confirmActionText.textContent = "Reject";
                        }
                    }).catch(function (err) {
                        console.error("API Error: ", err);
                        alert("An error occurred while submitting.");
                        $confirmActionBtn.disabled = false;
                        $confirmActionText.textContent = "Reject";
                    });
                }
            };

        })();
    </script>
