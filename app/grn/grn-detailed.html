<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRN Detail</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://static.zohocdn.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Shared Workflow Script for Audit Trail & Progress -->
    <script
        src="https://cdn.jsdelivr.net/gh/CharnSrinivas/Apco-P2P-Zoho-Creator@main/app/utils/process-flow-renderer.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">

    <style>
        [x-cloak] {
            display: none !important;
        }

        .btn-spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: transparent;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.7s linear infinite;
        }

        .btn-spinner-blue {
            border: 2px solid rgba(27, 92, 168, 0.2);
            border-top-color: #1B5CA8;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.7s linear infinite;
        }

        .grn-spinner {
            border: 2.5px solid #e5e7eb;
            border-top-color: #1B5CA8;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .step-connector {
            position: absolute;
            top: 14px;
            left: 14px;
            right: 14px;
            height: 3px;
            background: #e5e7eb;
            z-index: 0;
        }

        .step-connector-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            transition: width 0.6s ease;
            background: #1B5CA8;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.35s ease-out both;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-12px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateY(-12px) scale(0.96);
            }
        }

        .toast-enter {
            animation: toastIn 0.3s ease-out both;
        }

        .toast-leave {
            animation: toastOut 0.25s ease-in both;
        }
    </style>
</head>

<body class="bg-gray-50 p-4 md:p-6">

    <div id="app" x-data="grnWidget()" x-init="initWidget()" x-cloak
        class="font-[Lato,sans-serif] text-[13px] text-gray-700 antialiased max-w-6xl mx-auto w-full">

        <!-- Toast Notifications -->
        <div x-show="toast.show" x-cloak
            class="fixed top-5 right-5 z-[100] flex items-center gap-2.5 px-4 py-3 rounded-lg shadow-lg border text-[13px] font-medium max-w-sm"
            :class="{
                'bg-emerald-50 border-emerald-200 text-emerald-800': toast.type === 'success',
                'bg-red-50 border-red-200 text-red-800': toast.type === 'error'
            }" x-transition:enter="toast-enter" x-transition:leave="toast-leave">
            <i class="bi text-[15px]"
                :class="toast.type === 'success' ? 'bi-check-circle-fill text-emerald-600' : 'bi-exclamation-circle-fill text-red-600'"></i>
            <span x-text="toast.message"></span>
            <button @click="hideToast()" class="ml-auto text-gray-400 hover:text-gray-600 cursor-pointer">
                <i class="bi bi-x text-[15px]"></i>
            </button>
        </div>

        <!-- Action Modal -->
        <div x-show="showModal" style="display: none;"
            class="fixed inset-0 z-[60] flex items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden fade-in mx-4 border border-gray-200 flex flex-col"
                @click.away="closeModal()">
                <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                    <h3 class="text-[14px] font-bold text-gray-800" x-text="modalTitle"></h3>
                    <button @click="closeModal()"
                        class="text-gray-400 hover:text-gray-700 cursor-pointer transition-colors">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div class="p-5 bg-gray-50/50">
                    <label class="block text-xs font-semibold text-gray-700 mb-2">
                        Comment <span class="text-gray-400 font-normal text-[11px]">(Optional)</span>
                    </label>
                    <textarea x-model="modalComment" rows="3"
                        class="w-full border border-gray-300 rounded-lg p-3 text-[13px] text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#1B5CA8]/20 focus:border-[#1B5CA8] transition-all shadow-sm"
                        placeholder="Enter your remarks here..."></textarea>
                </div>
                <div class="px-5 py-3.5 bg-white flex justify-end gap-2.5 border-t border-gray-100 shrink-0">
                    <button @click="closeModal()" :disabled="isSubmitting"
                        class="px-4 py-2 rounded-lg text-xs font-semibold bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors cursor-pointer shadow-sm disabled:opacity-50">
                        Cancel
                    </button>
                    <button @click="submitAction()" :disabled="isSubmitting"
                        :class="modalBtnClass + ' ' + modalBtnHoverClass"
                        class="px-4 py-2 rounded-lg text-xs font-semibold text-white transition-colors cursor-pointer shadow-sm flex items-center gap-1.5 disabled:opacity-70">
                        <template x-if="isSubmitting">
                            <div class="btn-spinner mr-1"></div>
                        </template>
                        <span x-text="isSubmitting ? 'Submitting...' : modalBtnText"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- States -->
        <div x-show="isLoading" class="flex flex-col items-center justify-center py-24 gap-3">
            <div class="grn-spinner"></div>
            <div class="text-sm text-gray-400 font-medium">Loading GRN details…</div>
        </div>

        <div x-show="hasError" class="text-center py-24">
            <i class="bi bi-alert-circle text-4xl text-red-400 mb-3 block"></i>
            <div class="text-sm font-medium text-gray-600">Failed to load GRN details</div>
            <div class="text-xs text-gray-400 mt-1"
                x-text="errorMessage || 'Please check the record ID and try again.'"></div>
        </div>

        <!-- Main Content -->
        <div x-show="!isLoading && !hasError" class="fade-in pb-4">
            <!-- Header Section -->
            <div class="flex flex-col md:flex-row md:items-start justify-between mb-5 pt-2 gap-4">
                <div>
                    <nav class="flex items-center gap-1.5 text-xs mb-2.5">
                        <button
                            onclick="ZOHO.CREATOR.UTIL.navigateParentURL({action:'open',window:'same',url:'#Page:GRN_Approval'})"
                            class="text-[#1B5CA8] hover:text-[#14457e] font-medium transition-colors no-underline cursor-pointer">
                            Goods Receipt Notes
                        </button>
                        <i class="bi bi-chevron-right text-[10px] text-gray-400"></i>
                        <span class="text-gray-500 font-medium" x-text="grnNumber"></span>
                    </nav>
                    <div class="flex items-center gap-2.5 flex-wrap">
                        <h1 class="text-[18px] md:text-[20px] font-bold text-gray-900 leading-none" x-text="grnNumber">
                        </h1>
                        <span x-html="getStatusBadge(rec.Status)"></span>
                        <span
                            class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium tracking-wide border border-blue-200 bg-blue-50 text-blue-700">
                            <i class="bi bi-box-seam text-[10px]"></i> <span
                                x-text="rec.Items_Status || 'Pending'"></span>
                        </span>
                    </div>
                </div>

                <div class="flex items-center gap-2 shrink-0">
                    <!-- PRINT GRN BUTTON -->
                    <button @click="downloadPDF()" :disabled="isExportingPDF"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-[#EBF3FC] border border-[#1B5CA8]/30 text-[#1B5CA8] hover:bg-blue-100 rounded-md text-xs font-semibold transition-all shadow-sm cursor-pointer disabled:opacity-50">
                        <template x-if="!isExportingPDF"><i class="bi bi-printer"></i></template>
                        <template x-if="isExportingPDF">
                            <div class="btn-spinner-blue"></div>
                        </template>
                        <span x-text="isExportingPDF ? 'Preparing...' : 'Print GRN'"></span>
                    </button>
                </div>
            </div>

            <!-- Process Progress -->
            <div class="bg-white border border-gray-200 rounded-lg p-5 mb-5 w-full shadow-sm hidden md:block">
                <div class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide mb-4">P2P Process Progress
                </div>
                <div class="relative flex justify-between items-start" id="globalProgressContainer">
                    <div class="step-connector">
                        <div class="step-connector-fill" id="globalProgressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <!-- SECTION 1: GRN SUMMARY, VENDOR & SHIPMENT INFO -->
                <div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50">
                        <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                            <div
                                class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-[#EBF3FC] text-[#1B5CA8]">
                                <i class="bi bi-card-heading"></i>
                            </div>
                            Goods Receipt Summary
                        </div>
                    </div>

                    <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-6">
                        <!-- GRN Info -->
                        <div>
                            <div
                                class="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-3 border-b border-gray-100 pb-1">
                                GRN Info</div>
                            <div class="grid gap-2.5">
                                <div>
                                    <div class="text-[11px] text-gray-500 font-medium">GRN Number</div>
                                    <div class="text-[13px] font-bold text-gray-900" x-text="grnNumber"></div>
                                </div>
                                <div>
                                    <div class="text-[11px] text-gray-500 font-medium">GRN Date</div>
                                    <div class="text-[13px] font-semibold text-gray-800"
                                        x-text="formatDate(rec.GRN_Date)"></div>
                                </div>
                                <div>
                                    <div class="text-[11px] text-gray-500 font-medium">Delivery Date</div>
                                    <div class="text-[13px] font-semibold text-[#1B5CA8]"
                                        x-text="formatDate(rec.delivery_date)"></div>
                                </div>
                            </div>
                        </div>

                        <!-- References -->
                        <div>
                            <div
                                class="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-3 border-b border-gray-100 pb-1">
                                References</div>
                            <div class="grid gap-2.5">
                                <template x-if="rec.PO_Reference">
                                    <div>
                                        <div class="text-[11px] text-gray-500 font-medium">Purchase Order</div>
                                        <a :href="'#Page:PO_Detailed?recordId=' + (rec.PO_Reference?.ID || '')"
                                            class="text-[13px] font-semibold text-[#1B5CA8] hover:underline"
                                            x-text="rec.PO_Reference?.PO_Ref_Number"></a>
                                    </div>
                                </template>

                                <template x-if="rec.PR_References && rec.PR_References.length > 0">
                                    <div>
                                        <div class="text-[11px] text-gray-500 font-medium">Purchase Requisition(s)</div>
                                        <div class="flex flex-wrap gap-1 mt-0.5">
                                            <template x-for="(pr, index) in rec.PR_References" :key="pr.ID">
                                                <span>
                                                    <a :href="'#Page:PR_Detailed?recordId=' + pr.ID"
                                                        class="text-[12px] font-semibold text-[#1B5CA8] bg-[#EBF3FC] px-1.5 py-0.5 rounded hover:underline"
                                                        x-text="pr.PR_Number"></a>
                                                </span>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="rec.Quote_Comparison">
                                    <div>
                                        <div class="text-[11px] text-gray-500 font-medium">Quote Comparison</div>
                                        <a :href="'#Page:Quote_Comparison_Detailed?recordId=' + (rec.Quote_Comparison?.ID || '')"
                                            class="text-[13px] font-semibold text-[#1B5CA8] hover:underline"
                                            x-text="rec.Quote_Comparison?.QC_Ref_Number || ('QC-' + rec.Quote_Comparison?.QC_Number)"></a>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Vendor Details -->
                        <div>
                            <div
                                class="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-3 border-b border-gray-100 pb-1">
                                Supplier / Vendor</div>
                            <template x-if="rec.Vendor">
                                <div>
                                    <div class="text-[14px] font-bold text-gray-900"
                                        x-text="rec.Vendor.Display_Name || rec.Vendor.Company_Name || '–'"></div>
                                    <div class="text-xs text-gray-600 mt-2 space-y-1">
                                        <div class="flex items-start gap-1.5" x-show="rec.Vendor.email">
                                            <i class="bi bi-envelope text-gray-400 mt-0.5"></i>
                                            <span x-text="rec.Vendor.email"></span>
                                        </div>
                                        <div class="flex items-start gap-1.5" x-show="rec.Vendor.mobile">
                                            <i class="bi bi-telephone text-gray-400 mt-0.5"></i>
                                            <span x-text="rec.Vendor.mobile"></span>
                                        </div>
                                        <div class="flex items-start gap-1.5 mt-2">
                                            <i class="bi bi-geo-alt text-gray-400 mt-0.5"></i>
                                            <span
                                                x-html="formatAddress(rec.Vendor.Billing_Address) || 'Address not provided'"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="!rec.Vendor">
                                <div class="text-xs text-gray-400 italic">No vendor assigned</div>
                            </template>
                        </div>

                        <!-- Delivery Location (Unit) -->
                        <div>
                            <div
                                class="text-[10px] text-gray-400 font-bold uppercase tracking-wide mb-3 border-b border-gray-100 pb-1">
                                Delivered To</div>
                            <div>
                                <div class="text-[14px] font-bold text-gray-900" x-text="getDeliveryLocationName()">
                                </div>
                                <div class="text-xs text-gray-600 mt-2 space-y-1.5">
                                    <div class="flex items-start gap-1.5">
                                        <i class="bi bi-building text-gray-400 mt-0.5"></i>
                                        <span x-text="'Dept: ' + (rec.Department ? rec.Department.Name : '-')"></span>
                                    </div>
                                    <div class="flex items-start gap-1.5">
                                        <i class="bi bi-truck text-gray-400 mt-0.5"></i>
                                        <span class="leading-relaxed"
                                            x-html="getDeliveryAddress() || 'Delivery address not provided'"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2: LINE ITEMS & TOTALS -->
                <div class="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div
                        class="px-[18px] py-[13px] border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                        <div class="text-[12px] font-semibold text-gray-700 flex items-center gap-2">
                            <div
                                class="w-6 h-6 rounded flex items-center justify-center text-[11px] bg-[#EBF3FC] text-[#1B5CA8]">
                                <i class="bi bi-list-check"></i>
                            </div>
                            Received Line Items
                        </div>
                    </div>

                    <div x-show="items.length === 0" class="px-[18px] py-8 text-center text-gray-400 text-xs">
                        <i class="bi bi-inbox text-2xl mb-2 block"></i> No line items found
                    </div>

                    <div class="overflow-x-auto w-full" x-show="items.length > 0">
                        <table class="w-full border-collapse text-xs">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-left w-12">
                                        #</th>
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-left">
                                        Item Description</th>
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-right w-24">
                                        Ord. Qty</th>
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-right w-24">
                                        Rcvd Qty</th>
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-right w-28">
                                        Rate</th>
                                    <th
                                        class="px-4 py-3 text-[10px] font-bold text-gray-900 uppercase tracking-wide text-right w-32">
                                        Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(item, i) in items" :key="i">
                                    <tr class="border-b border-gray-50 hover:bg-gray-50/70 transition-colors">
                                        <td class="px-4 py-3 text-gray-400 font-mono text-[11px]" x-text="i + 1"></td>
                                        <td class="px-4 py-3 text-gray-900 font-medium">
                                            <span x-text="getItemName(item)"></span>
                                            <template x-if="item.Comment">
                                                <div class="text-[11px] text-gray-400 font-normal mt-1 block"
                                                    x-text="item.Comment"></div>
                                            </template>
                                        </td>
                                        <td class="px-4 py-3 text-gray-600 font-medium text-right tabular-nums"
                                            x-text="item.PO_Quantity || 0"></td>
                                        <td class="px-4 py-3 text-right tabular-nums">
                                            <span class="font-bold text-emerald-600"
                                                x-text="item.Received_Quantity || '0'"></span>
                                        </td>
                                        <td class="px-4 py-3 text-gray-600 text-right tabular-nums">
                                            <span x-text="formatCurrency(item.Rate)"></span>
                                            <div class="text-[10px] text-gray-400 mt-0.5"
                                                x-text="'per ' + getItemUnit(item)"></div>
                                        </td>
                                        <td class="px-4 py-3 text-gray-900 font-bold text-right tabular-nums"
                                            x-text="formatCurrency(item.Amount)"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Bottom Aligned Totals & Remarks -->
                    <div
                        class="bg-gray-50/80 p-5 flex flex-col md:flex-row justify-between items-start border-t border-gray-200">
                        <div class="w-full md:w-1/2 mb-4 md:mb-0">
                            <template x-if="rec.Remarks">
                                <div>
                                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-1.5">
                                        Remarks</div>
                                    <div class="text-xs text-gray-700 leading-relaxed bg-white border border-gray-200 rounded p-3 shadow-sm inline-block min-w-full"
                                        x-text="rec.Remarks"></div>
                                </div>
                            </template>

                            <!-- Attachments -->
                            <div x-show="hasAttachments" class="mt-4">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-1.5">
                                    Attachments</div>
                                <div class="space-y-2">
                                    <template x-for="(att, idx) in formattedAttachments" :key="idx">
                                        <div
                                            class="flex items-center justify-between p-2.5 border border-gray-200 rounded bg-white shadow-sm">
                                            <div class="flex items-center gap-2.5 overflow-hidden">
                                                <div
                                                    class="w-7 h-7 rounded bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
                                                    <i class="bi bi-file-earmark-text text-[14px]"></i>
                                                </div>
                                                <div class="text-xs font-semibold text-gray-800 truncate"
                                                    :title="att.displayName" x-text="att.displayName"></div>
                                            </div>
                                            <button @click="downloadFile(att.filePath)" title="Download Attachment"
                                                class="px-2.5 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 rounded text-[11px] font-semibold transition-colors flex items-center gap-1.5 cursor-pointer shrink-0">
                                                <i class="bi bi-download"></i> Download
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        <div class="w-full md:w-auto min-w-[280px] space-y-2.5 text-[13px]">
                            <div class="flex justify-between text-gray-600">
                                <span class="font-semibold">Sub Total</span>
                                <span class="font-medium tabular-nums text-gray-800"
                                    x-text="formatCurrency(rec.Sub_Total)"></span>
                            </div>
                            <template x-if="rec.Discount > 0">
                                <div class="flex justify-between text-gray-600">
                                    <span class="font-semibold">Discount (-)</span>
                                    <span class="font-medium tabular-nums text-red-600"
                                        x-text="formatCurrency(rec.Discount)"></span>
                                </div>
                            </template>
                            <template x-if="rec.CGST > 0">
                                <div class="flex justify-between text-gray-600">
                                    <span class="font-semibold">CGST (+)</span>
                                    <span class="font-medium tabular-nums text-gray-800"
                                        x-text="formatCurrency(rec.CGST)"></span>
                                </div>
                            </template>
                            <template x-if="rec.SGST > 0">
                                <div class="flex justify-between text-gray-600">
                                    <span class="font-semibold">SGST (+)</span>
                                    <span class="font-medium tabular-nums text-gray-800"
                                        x-text="formatCurrency(rec.SGST)"></span>
                                </div>
                            </template>
                            <template x-if="rec.IGST > 0">
                                <div class="flex justify-between text-gray-600 border-b border-gray-200 pb-2">
                                    <span class="font-semibold">IGST (+)</span>
                                    <span class="font-medium tabular-nums text-gray-800"
                                        x-text="formatCurrency(rec.IGST)"></span>
                                </div>
                            </template>
                            <div
                                class="flex justify-between border-t border-gray-200 pt-3 mt-1 text-[16px] font-black text-[#1B5CA8]">
                                <span>Grand Total</span>
                                <span class="tabular-nums" x-text="formatCurrency(rec.Total_Amount)"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-5 border-t border-gray-200 flex flex-wrap items-center gap-3 fade-in" x-cloak>
                    <button @click="approveGRN()" x-show="canApprove"
                        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-emerald-600 text-white border border-emerald-600 hover:bg-emerald-700 transition-colors no-underline cursor-pointer shadow-sm">
                        <i class="bi bi-check-circle-fill"></i> Approve GRN
                    </button>

                    <button @click="rejectGRN()" x-show="canApprove"
                        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-white text-red-600 border border-red-300 hover:bg-red-50 transition-colors no-underline cursor-pointer shadow-sm">
                        <i class="bi bi-x-circle-fill"></i> Reject GRN
                    </button>
                    <button @click="cancelGRN()"
                        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 transition-colors no-underline cursor-pointer shadow-sm">
                        <i class="bi bi-slash-circle"></i> Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('grnWidget', () => ({
                isLoading: true,
                hasError: false,
                errorMessage: '',
                recordId: null,
                rec: {},
                items: [],
                actions: [],

                isExportingPDF: false,

                // Modal
                showModal: false,
                modalTitle: '',
                modalComment: '',
                pendingStatus: '',
                modalBtnClass: '',
                modalBtnHoverClass: '',
                isSubmitting: false,

                // Toast
                toast: { show: false, message: '', type: 'success' },
                toastTimer: null,

                initWidget() {
                    if (typeof P2PWorkflowUtils !== 'undefined') P2PWorkflowUtils.init();
                    ZOHO.CREATOR.UTIL.getQueryParams().then((params) => {
                        this.recordId = params?.recordId || null;
                        if (!this.recordId) {
                            this.hasError = true;
                            this.isLoading = false;
                            this.errorMessage = 'No Record ID provided in URL parameters.';
                            return;
                        }
                        this.fetchData();
                    });
                },

                fetchData() {
                    this.isLoading = true;
                    this.hasError = false;

                    Promise.all([
                        ZOHO.CREATOR.DATA.invokeCustomApi({
                            api_name: typeof P2PWorkflowUtils !== 'undefined' ? P2PWorkflowUtils.API.FETCH_GRN_DETAILS : "fetch_grn_details",
                            http_method: "GET",
                            content_type: "application/json",
                            query_params: 'recId=' + this.recordId,
                        }),
                        ZOHO.CREATOR.DATA.getRecordById({ report_name: 'GRN_Report', id: this.recordId })
                    ]).then((responses) => {
                        const apiRes = responses[0];
                        const recByIdRes = responses[1];

                        if (!apiRes || !apiRes.result || apiRes.result.length === 0) {
                            throw new Error("No data returned");
                        }
                        this.rec = apiRes.result[0];
                        this.items = this.rec.Items || [];
                        this.actions = this.rec.Actions || [];

                        // Override Attachments with the native Zoho record response
                        // which returns proper file objects instead of just a numeric ID
                        if (recByIdRes?.data?.Attachments) {
                            this.rec.Attachments = recByIdRes.data.Attachments;
                        }

                        this.$nextTick(() => {
                            if (typeof P2PWorkflowUtils !== 'undefined') {
                                P2PWorkflowUtils.renderProgress(
                                    this.actions,
                                    this.rec.Current_Stage,
                                    document.getElementById('globalProgressContainer'),
                                    document.getElementById('globalProgressFill')
                                );
                            }
                        });

                        this.isLoading = false;
                    }).catch((err) => {
                        console.error('API Error:', err);
                        this.hasError = true;
                        this.isLoading = false;
                    });
                },

                get canApprove() {
                    const status = (this.rec.Status || '').toLowerCase();
                    return status === 'submitted';
                },

                get grnNumber() {
                    return this.rec.GRN_Ref_Number || (this.rec.GRN_Number ? 'GRN-' + this.rec.GRN_Number : '–');
                },

                // Unit field represents the delivery location
                getDeliveryLocationName() {
                    if (!this.rec.Unit) return '–';
                    return Array.isArray(this.rec.Unit) && this.rec.Unit.length
                        ? (this.rec.Unit[0].display_value || this.rec.Unit[0].Name || '–')
                        : (this.rec.Unit.Name || this.rec.Unit.display_value || '–');
                },

                getDeliveryAddress() {
                    let delivery = this.formatAddress(this.rec.Delivary_Address);
                    if (!delivery && this.rec.Unit && this.rec.Unit.length && this.rec.Unit[0].Address) {
                        delivery = this.formatAddress(this.rec.Unit[0].Address);
                    }
                    return delivery;
                },

                getStatusBadge(status) {
                    const s = (status || 'submitted').toLowerCase();
                    let border = 'border-amber-200', bg = 'bg-amber-50', text = 'text-amber-800', dot = 'bg-amber-500', label = status || 'Submitted';
                    if (s === 'approved') { border = 'border-emerald-200'; bg = 'bg-emerald-50'; text = 'text-emerald-800'; dot = 'bg-emerald-600'; label = 'Approved'; }
                    if (s === 'rejected') { border = 'border-red-200'; bg = 'bg-red-50'; text = 'text-red-800'; dot = 'bg-red-600'; label = 'Rejected'; }
                    if (s === 'draft') { border = 'border-gray-200'; bg = 'bg-gray-50'; text = 'text-gray-600'; dot = 'bg-gray-400'; label = 'Draft'; }
                    return `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold tracking-wide border ${border} ${bg} ${text}"><span class="w-[5px] h-[5px] rounded-full ${dot} shrink-0"></span>${label}</span>`;
                },

                getItemName(itemObj) {
                    if (!itemObj || !itemObj.Item) return '–';
                    return itemObj.Item.item_name || itemObj.Item.display_value || `Item #${itemObj.Item}`;
                },

                getItemUnit(itemObj) {
                    if (!itemObj || !itemObj.Item) return 'unit';
                    return itemObj.Item.unit_of_measure || 'unit';
                },

                formatDate(dateStr) {
                    if (!dateStr) return '–';
                    try {
                        const d = new Date(dateStr);
                        if (isNaN(d.getTime())) return dateStr;
                        const mos = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        return `${String(d.getDate()).padStart(2, '0')} ${mos[d.getMonth()]} ${d.getFullYear()}`;
                    } catch (e) { return dateStr; }
                },

                formatCurrency(amount) {
                    if (amount === null || amount === undefined || isNaN(amount)) return '–';
                    return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 2 }).format(amount);
                },

                formatAddress(addr) {
                    if (!addr || Object.keys(addr).length === 0) return null;
                    let parts = [];
                    if (addr.address_line_1) parts.push(addr.address_line_1);
                    if (addr.address_line_2) parts.push(addr.address_line_2);
                    if (addr.district_city) parts.push(addr.district_city);
                    if (addr.state_province) parts.push(addr.state_province);
                    if (addr.postal_Code) parts.push(addr.postal_Code);
                    if (addr.country) parts.push(addr.country);
                    return parts.length > 0 ? parts.join('<br>') : null;
                },

                // --- Attachment Helpers ---
                get hasAttachments() {
                    return this.rec.Attachments && (Array.isArray(this.rec.Attachments) ? this.rec.Attachments.length > 0 : true);
                },

                get formattedAttachments() {
                    if (!this.hasAttachments) return [];
                    const atts = Array.isArray(this.rec.Attachments) ? this.rec.Attachments : [this.rec.Attachments];
                    return atts.map(att => {
                        let fullPath = (typeof att === 'object' && att !== null) ? (att.display_value || att.ID || att) : att;
                        let filePath = String(fullPath);
                        if (filePath.includes('filepath=')) filePath = filePath.split('filepath=')[1].split('&')[0];
                        let displayName = filePath;
                        const parts = filePath.split('_');
                        if (parts.length > 1 && !isNaN(parts[0])) displayName = parts.slice(1).join('_');
                        return { filePath, displayName };
                    });
                },

                downloadFile(filePath) {
                    if (typeof P2PWorkflowUtils !== 'undefined') {
                        P2PWorkflowUtils.downloadFile(filePath, 'GRN_Report', this.recordId);
                    }
                },

                escapeHtml(str) {
                    if (!str) return '';
                    const d = document.createElement('div');
                    d.textContent = str;
                    return d.innerHTML;
                },

                // ─── PDF Print Logic ───
                downloadPDF() {
                    if (!this.rec) return;
                    this.isExportingPDF = true;
                    try {
                        let itemRows = '';
                        this.items.forEach((item, i) => {
                            itemRows += `
                                <tr>
                                    <td class="text-center">${i + 1}</td>
                                    <td>
                                        <strong>${this.escapeHtml(this.getItemName(item))}</strong>
                                        ${item.Comment ? `<br><small style="color:#666;">${this.escapeHtml(item.Comment)}</small>` : ''}
                                    </td>
                                    <td class="text-center">${item.PO_Quantity || 0}</td>
                                    <td class="text-center"><strong>${item.Received_Quantity || 0}</strong></td>
                                    <td class="text-right">${this.formatCurrency(item.Rate)}</td>
                                    <td class="text-right">${this.formatCurrency(item.Amount)}</td>
                                </tr>
                            `;
                        });

                        const vendorName = this.rec.Vendor ? (this.rec.Vendor.Display_Name || this.rec.Vendor.Company_Name || '') : '–';
                        const vendorEmail = this.rec.Vendor?.email || '';
                        const vendorPhone = this.rec.Vendor?.mobile || '';
                        const vendorAddr = this.formatAddress(this.rec.Vendor?.Billing_Address) || 'Address not provided';
                        const shippingAddr = this.getDeliveryAddress() || 'Delivery address not provided';

                        const printedDateTime = dayjs().format('DD-MMM-YYYY HH:mm:ss');

                        let prHtml = '';
                        if (this.rec.PR_References && this.rec.PR_References.length > 0) {
                            let prNos = this.rec.PR_References.map(p => p.PR_Number).join(', ');
                            prHtml = `<div class="grn-meta-item"><span>PR Reference(s)</span><strong>${this.escapeHtml(prNos)}</strong></div>`;
                        }

                        const printHTML = `
                            <!DOCTYPE html>
                            <html lang="en">
                            <head>
                                <meta charset="UTF-8">
                                <title>${this.grnNumber} - Goods Receipt Note</title>
                                <style>
                                    :root { --primary-color: #1B5CA8; --border-color: #bdc3c7; --bg-gray: #f8f9fa; }
                                    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.5; margin: 0; padding: 20px; font-size: 11pt; }
                                    .document-wrapper { max-width: 800px; margin: 0 auto; }
                                    .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 25px; }
                                    .company-info h1 { margin: 0; color: var(--primary-color); font-size: 24pt; }
                                    .company-info p { margin: 4px 0; color: #555; }
                                    
                                    .document-title { text-align: right; }
                                    .document-title h2 { margin: 0 0 5px 0; font-size: 20pt; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-color); }
                                    .printed-date { font-size: 9pt; color: #666; margin-top: 5px; }
                                    
                                    .grn-meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; background: var(--bg-gray); padding: 15px; border: 1px solid var(--border-color); }
                                    .grn-meta-item { font-size: 10pt; }
                                    .grn-meta-item span { display: block; color: #555; font-size: 9pt; text-transform: uppercase; margin-bottom: 3px; }
                                    .grn-meta-item strong { display: block; font-size: 11pt; color: #111; }
                                    
                                    .addresses { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
                                    .address-box { flex: 1; border: 1px solid var(--border-color); padding: 15px; }
                                    .address-box h3 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; color: var(--primary-color); font-size: 12pt; text-transform: uppercase;}
                                    
                                    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                                    th, td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
                                    th { background-color: var(--primary-color); color: white; font-weight: bold; font-size: 10pt; text-transform: uppercase; }
                                    .text-right { text-align: right; }
                                    .text-center { text-align: center; }
                                    
                                    .totals-container { width: 40%; float: right; margin-bottom: 30px; }
                                    .totals-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
                                    .totals-row.grand-total { font-weight: bold; font-size: 14pt; color: var(--primary-color); border-bottom: none; border-top: 2px solid var(--primary-color); padding-top: 10px; margin-top: 5px; }
                                    .clearfix::after { content: ""; clear: both; display: table; }

                                    .remarks-box { border: 1px solid var(--border-color); padding: 15px; margin-bottom: 40px; page-break-inside: avoid; }
                                    .remarks-box h4 { margin-top: 0; margin-bottom: 10px; color: var(--primary-color); }
                                    
                                    .signature-section { display: flex; justify-content: space-between; margin-top: 60px; page-break-inside: avoid; }
                                    .signature-box { width: 30%; border-top: 1px solid #000; text-align: center; padding-top: 5px; font-weight: bold; color: #555;}
                                    
                                    @media print {
                                        body { padding: 0; background: white; }
                                        .document-wrapper { max-width: 100%; }
                                        th { background-color: var(--primary-color) !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                                        .grn-meta-grid { background-color: var(--bg-gray) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                                        @page { size: A4; margin: 1.5cm; }
                                        tr { page-break-inside: avoid; }
                                    }
                                </style>
                            </head>
                            <body>
                                <div class="document-wrapper">
                                    <header class="header">
                                        <div class="company-info">
                                            <h1>APCO Building Solutions Pvt Ltd</h1>
                                            <p>#234, Narayan Nagar, 1st stage, Doddakallasandra, Kanakapura road, Bangalore - 560062.</p>
                                        </div>
                                        <div class="document-title">
                                            <h2>Goods Receipt Note</h2>
                                            <div style="font-size: 14pt; font-weight: bold; color: #444;">${this.escapeHtml(this.grnNumber)}</div>
                                            <div class="printed-date">Printed: ${printedDateTime}</div>
                                        </div>
                                    </header>
                                    
                                    <div class="grn-meta-grid">
                                        <div class="grn-meta-item"><span>GRN Date</span><strong>${this.formatDate(this.rec.GRN_Date)}</strong></div>
                                        <div class="grn-meta-item"><span>Delivery Date</span><strong>${this.formatDate(this.rec.delivery_date)}</strong></div>
                                        <div class="grn-meta-item"><span>PO Reference</span><strong>${this.escapeHtml(this.rec.PO_Reference?.PO_Ref_Number || 'N/A')}</strong></div>
                                        ${prHtml}
                                    </div>

                                    <div class="addresses">
                                        <div class="address-box">
                                            <h3>Supplier Details</h3>
                                            <strong>${this.escapeHtml(vendorName)}</strong><br>
                                            ${vendorEmail ? 'Email: ' + this.escapeHtml(vendorEmail) + '<br>' : ''}
                                            ${vendorPhone ? 'Phone: ' + this.escapeHtml(vendorPhone) + '<br>' : ''}
                                            <div style="margin-top: 5px;">${vendorAddr}</div>
                                        </div>
                                        <div class="address-box">
                                            <h3>Delivered To</h3>
                                            <strong>${this.escapeHtml(this.getDeliveryLocationName())}</strong><br>
                                            <div style="margin-top: 5px;">${shippingAddr}</div>
                                        </div>
                                    </div>
                                    
                                    <table>
                                        <thead>
                                            <tr>
                                                <th width="5%" class="text-center">#</th>
                                                <th width="35%">Item Description</th>
                                                <th width="12%" class="text-center">PO Qty</th>
                                                <th width="12%" class="text-center">Rcvd Qty</th>
                                                <th width="16%" class="text-right">Rate</th>
                                                <th width="20%" class="text-right">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody>${itemRows}</tbody>
                                    </table>
                                    
                                    <div class="clearfix">
                                        <div class="totals-container">
                                            <div class="totals-row"><span>Sub Total:</span> <span>${this.formatCurrency(this.rec.Sub_Total)}</span></div>
                                            ${this.rec.Discount > 0 ? `<div class="totals-row"><span>Discount:</span> <span style="color:red;">-${this.formatCurrency(this.rec.Discount)}</span></div>` : ''}
                                            ${this.rec.CGST > 0 ? `<div class="totals-row"><span>CGST:</span> <span>${this.formatCurrency(this.rec.CGST)}</span></div>` : ''}
                                            ${this.rec.SGST > 0 ? `<div class="totals-row"><span>SGST:</span> <span>${this.formatCurrency(this.rec.SGST)}</span></div>` : ''}
                                            ${this.rec.IGST > 0 ? `<div class="totals-row"><span>IGST:</span> <span>${this.formatCurrency(this.rec.IGST)}</span></div>` : ''}
                                            <div class="totals-row grand-total"><span>Grand Total:</span> <span>${this.formatCurrency(this.rec.Total_Amount)}</span></div>
                                        </div>
                                    </div>
                                    
                                    ${this.rec.Remarks ? `
                                    <div class="remarks-box">
                                        <h4>Remarks</h4>
                                        <div style="white-space: pre-wrap; font-size: 9pt;">${this.escapeHtml(this.rec.Remarks)}</div>
                                    </div>` : ''}
                                    
                                    <div class="signature-section">
                                        <div class="signature-box">Store Keeper Signature</div>
                                        <div class="signature-box">Receiver Signature</div>
                                        <div class="signature-box">Quality Check (QC)</div>
                                    </div>
                                </div>
                            </body>
                            </html>
                        `;

                        const iframe = document.createElement('iframe');
                        iframe.style.position = 'fixed';
                        iframe.style.right = '0'; iframe.style.bottom = '0'; iframe.style.width = '0'; iframe.style.height = '0'; iframe.style.border = '0';
                        document.body.appendChild(iframe);
                        const frameDoc = iframe.contentWindow.document;
                        frameDoc.open(); frameDoc.write(printHTML); frameDoc.close();
                        setTimeout(() => {
                            iframe.contentWindow.focus();
                            const originalTitle = document.title;
                            document.title = `${this.grnNumber}_Goods_Receipt`;
                            iframe.contentWindow.print();
                            setTimeout(() => { document.body.removeChild(iframe); document.title = originalTitle; }, 2000);
                            this.isExportingPDF = false;
                        }, 500);
                    } catch (err) {
                        console.error('PDF generation failed:', err);
                        this.showToast('Failed to generate PDF.', 'error');
                        this.isExportingPDF = false;
                    }
                },

                showToast(message, type = 'success') {
                    if (this.toastTimer) clearTimeout(this.toastTimer);
                    this.toast = { show: true, message, type };
                    this.toastTimer = setTimeout(() => this.hideToast(), 4000);
                },

                hideToast() {
                    this.toast.show = false;
                    if (this.toastTimer) { clearTimeout(this.toastTimer); this.toastTimer = null; }
                },

                openModal(title, status, btnBgClass, btnHoverClass) {
                    this.modalTitle = title;
                    this.pendingStatus = status;
                    this.modalBtnClass = btnBgClass;
                    this.modalBtnHoverClass = btnHoverClass;
                    this.modalComment = '';
                    this.showModal = true;
                },

                closeModal() {
                    if (this.isSubmitting) return;
                    this.showModal = false;
                },

                get modalBtnText() { return this.modalTitle ? this.modalTitle.split(' ')[0] : 'Submit'; },

                approveGRN() {
                    this.openModal("Approve GRN", "Approved", "bg-emerald-600", "hover:bg-emerald-700");
                },

                rejectGRN() {
                    this.openModal("Reject GRN", "Rejected", "bg-red-600", "hover:bg-red-700");
                },
                cancelGRN() { ZOHO.CREATOR.UTIL.navigateParentURL({ action: 'open', window: 'same', url: '#Page:GRN_Approval' }); },
                async submitAction() {
                    this.isSubmitting = true;
                    try {
                        let poId = (this.rec.PO_Reference && this.rec.PO_Reference.ID) ? this.rec.PO_Reference.ID : null;

                        if (this.pendingStatus === 'Approved' && poId) {
                            const poRes = await ZOHO.CREATOR.DATA.invokeCustomApi({
                                api_name: typeof P2PWorkflowUtils !== 'undefined' ? P2PWorkflowUtils.API.FETCH_PO_DETAILS : "fetch_po_details",
                                http_method: "GET",
                                content_type: "application/json",
                                query_params: 'recId=' + poId,
                            });

                            if (!poRes || !poRes.result || poRes.result.length === 0) {
                                throw new Error("Could not fetch complete referenced PO details");
                            }
                            let poData = poRes.result[0];

                            let validationErrorMsg = null;
                            let allComplete = true;

                            let poItemsPayload = (poData.Items || []).map(poItem => {
                                let grnMatchedItem = this.items.find(gItem => gItem.Item.ID === poItem.Item.ID);
                                let addedQty = grnMatchedItem ? parseInt(grnMatchedItem.Received_Quantity || 0) : 0;

                                let poQty = parseInt(poItem.Quantity || 0);
                                let poAccumulatedReceived = parseInt(poItem.Received_Quantity || 0);

                                let remainingQtyAfterGrn = (poQty - poAccumulatedReceived) - addedQty;

                                if (remainingQtyAfterGrn < 0) {
                                    let itemName = grnMatchedItem ? this.getItemName(grnMatchedItem) : 'Item';
                                    validationErrorMsg = `Quantity mismatch for ${itemName}. Attempting to receive ${addedQty}, but only ${poQty - poAccumulatedReceived} remaining on PO.`;
                                }

                                let totalReceived = poAccumulatedReceived + addedQty;
                                if (totalReceived < poQty) {
                                    allComplete = false;
                                }
                                let updatedPoItem = { ...poItem };
                                updatedPoItem.Item = poItem.Item.ID;
                                return {
                                    ...updatedPoItem,
                                    Received_Quantity: totalReceived
                                };
                            });

                            if (validationErrorMsg) {
                                this.showToast(validationErrorMsg, 'error');
                                this.isSubmitting = false;
                                return;
                            }

                            // let newPoStatus = allComplete ? "Completely Received" : "Partially Received";

                            // await ZOHO.CREATOR.DATA.updateRecordById({
                            //     report_name: "Purchase_Order_Report",
                            //     id: poId,
                            //     payload: { data: { Items: poItemsPayload, Items_Status: newPoStatus } }
                            // });
                        }

                        const grnUpdateRes = await ZOHO.CREATOR.DATA.updateRecordById({
                            report_name: "GRN_Report",
                            id: this.recordId,
                            payload: { data: { Status: this.pendingStatus } }
                        });

                        if (grnUpdateRes.code !== 3000) throw new Error(grnUpdateRes.message || 'Failed to update GRN status');

                        if (this.rec.PR_Reference && this.rec.PR_Reference.ID) {
                            await ZOHO.CREATOR.DATA.addRecords({
                                form_name: "PR_Action",
                                payload: {
                                    data: {
                                        PR_Number: this.rec.PR_Reference.ID,
                                        Status: this.pendingStatus,
                                        Moved_To: "GRN",
                                        Comment: this.modalComment.trim()
                                    }
                                }
                            });
                        }

                        this.showToast(`GRN successfully ${this.pendingStatus.toLowerCase()}.`, 'success');
                        this.closeModal();
                        setTimeout(() => { this.fetchData(); }, 1500);

                    } catch (err) {
                        console.error(err);
                        this.showToast(err.message || "An error occurred while submitting. Please try again.", 'error');
                    } finally {
                        this.isSubmitting = false;
                    }
                }
            }));
        });
    </script>
</body>

</html>
